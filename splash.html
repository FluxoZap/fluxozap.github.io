<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FluxoZap</title>

<style>
body{
 margin:0;
 height:100vh;
 display:flex;
 justify-content:center;
 align-items:center;
 background:linear-gradient(135deg,#6a00ff,#8e2de2);
 color:white;
 font-family:Arial;
 flex-direction:column;
}

.logo{
 font-size:28px;
 font-weight:bold;
 margin-bottom:10px;
}

.loader{
 width:40px;
 height:40px;
 border:4px solid white;
 border-top:4px solid transparent;
 border-radius:50%;
 animation:spin 1s linear infinite;
}

@keyframes spin{
 to{transform:rotate(360deg);}
}
</style>
</head>

<body>

<div class="logo">FluxoZap 💳</div>
<div class="loader"></div>

<script>
setTimeout(()=>{
 location.href="index.html";
},2000);
</script>

</body>
</html>
