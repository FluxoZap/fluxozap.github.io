<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>FluxoZap</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  font-family:Inter;
  background:#0b0c10;
  color:white;
  display:flex;
  align-items:center;
  justify-content:center;
  height:100vh;
}

.box{
  background:#15171c;
  padding:40px;
  border-radius:20px;
  width:300px;
}

input{
  width:100%;
  padding:12px;
  margin-top:10px;
  border:none;
  border-radius:10px;
  background:#222;
  color:white;
}

button{
  width:100%;
  padding:12px;
  margin-top:15px;
  border:none;
  border-radius:10px;
  background:#00c853;
  font-weight:bold;
}

h1{
  text-align:center;
}
</style>
</head>

<body>

<div class="box">
<h1>FluxoZap 💳</h1>

<input id="email" placeholder="Email">
<input id="senha" type="password" placeholder="Senha">

<button onclick="login()">Entrar</button>
<button onclick="cadastrar()">Criar conta</button>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const firebaseConfig={
  apiKey:"AIzaSyAh0Qi4lm-ZXQLe4YAca8wYbp5kcU6lY3I",
  authDomain:"fluxozap-10ead.firebaseapp.com",
  projectId:"fluxozap-10ead"
};

const app=initializeApp(firebaseConfig);
const auth=getAuth(app);

window.login=()=>{
  signInWithEmailAndPassword(auth,email.value,senha.value)
  .then(()=>window.location.href="dashboard.html")
  .catch(()=>alert("Erro ao entrar"));
}

window.cadastrar=()=>{
  createUserWithEmailAndPassword(auth,email.value,senha.value)
  .then(()=>alert("Conta criada!"))
  .catch(()=>alert("Erro ao cadastrar"));
}
</script>

</body>
</html>
