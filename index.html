<!DOCTYPE html>
<html>
<head>
  <title>FluxoZap 💸</title>

  <style>
    body {
      margin: 0;
      font-family: 'Poppins', sans-serif;
      background: #0f0f0f;
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .box {
      width: 300px;
    }

    h1 {
      font-size: 28px;
      margin-bottom: 30px;
    }

    input {
      width: 100%;
      padding: 14px;
      margin-bottom: 10px;
      border-radius: 12px;
      border: none;
      background: #1c1c1c;
      color: white;
      font-size: 14px;
    }

    button {
      width: 100%;
      padding: 14px;
      margin-top: 10px;
      border-radius: 12px;
      border: none;
      font-weight: bold;
      font-size: 15px;
      cursor: pointer;
    }

    .login {
      background: #00c853;
    }

    .criar {
      background: #2962ff;
    }
  </style>
</head>

<body>

<div class="box">
  <h1>FluxoZap 💸</h1>

  <input id="email" placeholder="Email ou CPF">
  <input id="senha" type="password" placeholder="Senha">

  <button class="login" onclick="login()">Entrar</button>
  <button class="criar" onclick="irCadastro()">Criar conta</button>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, signInWithEmailAndPassword(auth, email.value, senha.value)
  .then((userCredential) => {
    console.log("Logado:", userCredential.user);
    window.location.href = "dashboard.html";
  })
  .catch((error) => {
    alert("Erro ao entrar: " + error.message);
  }); } 
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyAh0Qi4lm-ZXQLe4YAca8wYbp5kcU6lY3I",
  authDomain: "fluxozap-10ead.firebaseapp.com",
  projectId: "fluxozap-10ead",
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

window.login = function() {
  signInWithEmailAndPassword(auth, email.value, senha.value)
    .then(() => window.location = "dashboard.html")
    .catch(() => alert("Erro ao entrar"));
}

window.irCadastro = function() {
  window.location = "cadastro.html";
}
</script>

</body>
</html>
