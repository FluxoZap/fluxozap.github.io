<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>FluxoZap</title>

<style>
body{
 background:#0f0f14;
 color:white;
 font-family:Arial;
 display:flex;
 justify-content:center;
 align-items:center;
 height:100vh;
}

.box{
 background:#1c1c25;
 padding:30px;
 border-radius:15px;
 width:320px;
}

input,select{
 width:100%;
 padding:10px;
 margin-top:10px;
 background:#2a2a35;
 border:none;
 border-radius:8px;
 color:white;
}

button{
 width:100%;
 padding:10px;
 margin-top:10px;
 border:none;
 border-radius:8px;
 background:#6a00ff;
 color:white;
}
</style>
</head>

<body>

<div class="box">
<h2>FluxoZap 💳</h2>

<input id="nome" placeholder="Nome">
<input id="email" placeholder="Email">
<input id="senha" type="password" placeholder="Senha">

<select id="tipo">
<option value="pessoal">Conta pessoal</option>
<option value="profissional">Conta profissional</option>
</select>

<select id="nivel">
<option value="admin">Patrão</option>
<option value="funcionario">Funcionário</option>
</select>

<button onclick="cadastrar()">Criar conta</button>
<button onclick="login()">Entrar</button>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const app = initializeApp({
 apiKey:"AIzaSyAh0Qi4lm-ZXQLe4YAca8wYbp5kcU6lY3I",
 authDomain:"fluxozap-10ead.firebaseapp.com",
 projectId:"fluxozap-10ead"
});

const auth=getAuth(app);
const db=getFirestore(app);

window.cadastrar = async()=>{
 let user = await createUserWithEmailAndPassword(auth,email.value,senha.value);

 let empresaId;

 if(tipo.value==="profissional"){
  if(nivel.value==="admin"){
    empresaId = user.user.uid;
  }else{
    empresaId = prompt("Digite o ID da empresa (do patrão)");
  }
 }else{
  empresaId = user.user.uid;
 }

 await setDoc(doc(db,"usuarios",user.user.uid),{
  nome:nome.value,
  tipo:tipo.value,
  nivel:nivel.value,
  empresaId
 });

 alert("Conta criada!");
}

window.login=async()=>{
 await signInWithEmailAndPassword(auth,email.value,senha.value);
 location.href="dashboard.html";
}
</script>

</body>
</html>
