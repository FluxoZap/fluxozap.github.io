<!DOCTYPE html>
<html>
<head>
  <title>FluxoZap 💸</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      font-family: 'Poppins', sans-serif;
      background: #0f0f0f;
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .box {
      width: 300px;
    }

    h1 {
      margin-bottom: 25px;
    }

    input {
      width: 100%;
      padding: 14px;
      margin-bottom: 10px;
      border-radius: 12px;
      border: none;
      background: #1c1c1c;
      color: white;
    }

    button {
      width: 100%;
      padding: 14px;
      border-radius: 12px;
      border: none;
      margin-top: 10px;
      font-weight: bold;
      cursor: pointer;
    }

    .login { background: #00c853; }
    .criar { background: #2962ff; }
  </style>
</head>

<body>

<div class="box">
  <h1>FluxoZap 💸</h1>

  <input id="email" placeholder="Email">
  <input id="senha" type="password" placeholder="Senha">

  <button class="login" onclick="login()">Entrar</button>
  <button class="criar" onclick="irCadastro()">Criar conta</button>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, signInWithEmailAndPassword } 
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyAh0Qi4lm-ZXQLe4YAca8wYbp5kcU6lY3I",
  authDomain: "fluxozap-10ead.firebaseapp.com",
  projectId: "fluxozap-10ead",
  storageBucket: "fluxozap-10ead.firebasestorage.app",
  messagingSenderId: "743375450552",
  appId: "1:743375450552:web:48b85313fbc7fc30b29f4d"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

window.login = function() {
  signInWithEmailAndPassword(auth, email.value, senha.value)
    .then((userCredential) => {
      window.location.href = "dashboard.html";
    })
    .catch((error) => {
      alert("Erro: " + error.message);
    });
}

window.irCadastro = function() {
  window.location.href = "cadastro.html";
}
</script>

</body>
</html>
