<!DOCTYPE html>
<html>
<head>
  <title>FluxoZap 💸</title>

  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(180deg, #0f0f0f, #1a1a1a);
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .card {
      background: #151515;
      padding: 25px;
      border-radius: 15px;
      width: 320px;
      box-shadow: 0 0 20px rgba(0,0,0,0.5);
    }

    h2 {
      text-align: center;
      margin-bottom: 20px;
      font-weight: 600;
    }

    input, select {
      width: 100%;
      padding: 12px;
      margin: 6px 0;
      border-radius: 10px;
      border: none;
      background: #222;
      color: white;
      outline: none;
    }

    input::placeholder {
      color: #888;
    }

    button {
      width: 100%;
      padding: 12px;
      margin-top: 10px;
      border-radius: 10px;
      border: none;
      font-weight: bold;
      cursor: pointer;
      font-size: 15px;
    }

    .btn-cadastrar {
      background: #00c853;
      color: white;
    }

    .btn-login {
      background: #2962ff;
      color: white;
    }
  </style>
</head>

<body>

<div class="card">
  <h2>FluxoZap 💸</h2>

  <input id="nome" placeholder="Nome completo">
  <input id="email" placeholder="Email">
  <input id="senha" type="password" placeholder="Senha">
  <input id="whatsapp" placeholder="WhatsApp">

  <input id="profissao" placeholder="Profissão">
  <input id="salario" type="number" placeholder="Salário">

  <select id="tipo">
    <option value="fixo">Salário Fixo</option>
    <option value="variavel">Variável</option>
  </select>

  <input id="dataRecebe" type="date">

  <button class="btn-cadastrar" onclick="cadastrar()">Cadastrar</button>
  <button class="btn-login" onclick="login()">Entrar</button>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword } 
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import { getFirestore, setDoc, doc } 
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyAh0Qi4lm-ZXQLe4YAca8wYbp5kcU6lY3I",
  authDomain: "fluxozap-10ead.firebaseapp.com",
  projectId: "fluxozap-10ead",
  storageBucket: "fluxozap-10ead.firebasestorage.app",
  messagingSenderId: "743375450552",
  appId: "1:743375450552:web:48b85313fbc7fc30b29f4d"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

window.cadastrar = async function() {
  if (!nome.value || !email.value || !senha.value || !whatsapp.value) {
    return alert("Preencha todos os campos!");
  }

  let user = await createUserWithEmailAndPassword(auth, email.value, senha.value);

  await setDoc(doc(db, "usuarios", user.user.uid), {
    nome: nome.value,
    email: email.value,
    whatsapp: whatsapp.value,
    profissao: profissao.value,
    salario: parseFloat(salario.value),
    tipo: tipo.value,
    dataRecebe: dataRecebe.value
  });

  alert("Cadastro completo!");
}

window.login = function() {
  signInWithEmailAndPassword(auth, email.value, senha.value)
    .then(() => window.location = "dashboard.html");
}
</script>

</body>
</html>
