<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>FluxoZap</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
  margin:0;
  font-family:'Inter',sans-serif;
  background:#0f1115;
  color:white;
}

.container{
  display:flex;
  height:100vh;
}

.sidebar{
  width:220px;
  background:#15171c;
  padding:20px;
}

.sidebar h2{
  margin:0;
}

.sidebar div{
  margin-top:20px;
  color:#aaa;
}

.main{
  flex:1;
  padding:20px;
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:20px;
}

.bloco{
  background:#1a1d23;
  padding:20px;
  border-radius:15px;
}

.saldo{
  font-size:38px;
  font-weight:bold;
}

input{
  padding:12px;
  border-radius:10px;
  border:none;
  background:#2a2d35;
  color:white;
  margin-top:10px;
}

button{
  padding:12px;
  border:none;
  border-radius:10px;
  font-weight:bold;
  margin-top:10px;
  cursor:pointer;
}

.recebi{background:#00c853;}
.gastei{background:#d50000;}

.alerta{
  background:#ff1744;
  padding:10px;
  border-radius:10px;
  margin-top:10px;
  display:none;
}

.item{
  margin-top:10px;
}

@media(max-width:900px){
  .container{flex-direction:column;}
  .sidebar{width:100%;display:flex;justify-content:space-around;}
  .main{grid-template-columns:1fr;}
}
</style>
</head>

<body>

<div class="container">

<div class="sidebar">
  <h2>FluxoZap</h2>
  <div>Dashboard</div>
  <div>Extrato</div>
  <div>Conta</div>
</div>

<div class="main">

<!-- SALDO -->
<div class="bloco">
  <div>Saldo Total</div>
  <div class="saldo">R$ <span id="saldo">0.00</span></div>
  <div id="alerta" class="alerta">⚠️ Você já gastou 75%!</div>
</div>

<!-- ORÇAMENTO -->
<div class="bloco">
  <h3>Orçamento mensal</h3>

  <input id="orcamentoInput" type="number" placeholder="Definir orçamento">
  <button onclick="salvarOrcamento()" class="recebi">Salvar</button>

  <div style="margin-top:10px;">
    Usado: R$ <span id="usado">0</span><br>
    Restante: R$ <span id="restante">0</span>
  </div>

  <div style="background:#333;height:10px;border-radius:10px;margin-top:10px;">
    <div id="barra" style="height:10px;background:#00c853;width:0%;border-radius:10px;"></div>
  </div>

  <small id="alertaOrcamento"></small>
</div>

<!-- MOVIMENTOS -->
<div class="bloco">
  <input id="entradaValor" type="number" placeholder="Valor recebido">
  <button class="recebi" onclick="addEntrada()">Receber</button>

  <input id="saidaValor" type="number" placeholder="Valor gasto">
  <button class="gastei" onclick="addSaida()">Gastar</button>
</div>

<!-- GRAFICO + EXTRATO -->
<div class="bloco">
  <canvas id="grafico"></canvas>
  <div id="percentual"></div>
  <hr style="border-color:#333;">
  <div id="lista"></div>
</div>

</div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs, query, where } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyAh0Qi4lm-ZXQLe4YAca8wYbp5kcU6lY3I",
  authDomain: "fluxozap-10ead.firebaseapp.com",
  projectId: "fluxozap-10ead"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

let userId="";
let chart;
let orcamento=0;

onAuthStateChanged(auth,(user)=>{
  if(user){
    userId=user.uid;
    carregar();
  }else{
    window.location.href="index.html";
  }
});

window.salvarOrcamento=async function(){
  let v=parseFloat(document.getElementById("orcamentoInput").value);
  if(!v) return;

  await addDoc(collection(db,"configuracao"),{
    userId,
    orcamentoMensal:v
  });

  carregar();
}

window.addEntrada=async function(){
  let v=parseFloat(document.getElementById("entradaValor").value);
  if(!v) return;

  await addDoc(collection(db,"movimentos"),{
    tipo:"entrada",
    valor:v,
    data:new Date().toISOString(),
    userId
  });

  carregar();
}

window.addSaida=async function(){
  let v=parseFloat(document.getElementById("saidaValor").value);
  if(!v) return;

  await addDoc(collection(db,"movimentos"),{
    tipo:"saida",
    valor:v,
    data:new Date().toISOString(),
    userId
  });

  carregar();
}

async function carregar(){
  let saldo=0,entrada=0,saida=0;

  let lista=document.getElementById("lista");
  lista.innerHTML="";

  const q=query(collection(db,"movimentos"),where("userId","==",userId));
  const docs=await getDocs(q);

  docs.forEach(doc=>{
    let d=doc.data();

    if(d.tipo==="entrada"){saldo+=d.valor;entrada+=d.valor;}
    else{saldo-=d.valor;saida+=d.valor;}

    lista.innerHTML+=`
      <div class="item">
        ${d.tipo==="entrada"?"Entrada":"Saída"} - ${new Date(d.data).toLocaleString()}
        <br>
        <strong style="color:${d.tipo==="entrada"?"#00e676":"#ff5252"}">
        R$ ${d.valor.toFixed(2)}
        </strong>
      </div>
    `;
  });

  document.getElementById("saldo").innerText=saldo.toFixed(2);

  // ALERTA GASTO
  let percGasto=entrada? (saida/entrada)*100:0;
  document.getElementById("alerta").style.display =
    percGasto>=75 ? "block":"none";

  // ORÇAMENTO
  const q2=query(collection(db,"configuracao"),where("userId","==",userId));
  const snap=await getDocs(q2);

  snap.forEach(doc=>{
    orcamento=doc.data().orcamentoMensal;
  });

  let restante=orcamento-saida;
  let perc=orcamento? (saida/orcamento)*100:0;

  document.getElementById("usado").innerText=saida.toFixed(2);
  document.getElementById("restante").innerText=restante.toFixed(2);
  document.getElementById("barra").style.width=perc+"%";

  let alertaOrc=document.getElementById("alertaOrcamento");

  if(perc>=100){
    alertaOrc.innerText="⚠️ Orçamento ultrapassado!";
    alertaOrc.style.color="red";
  }else if(perc>=75){
    alertaOrc.innerText="⚠️ 75% do orçamento usado";
    alertaOrc.style.color="orange";
  }else{
    alertaOrc.innerText="";
  }

  // GRAFICO
  const ctx=document.getElementById("grafico");
  if(chart) chart.destroy();

  chart=new Chart(ctx,{
    type:'doughnut',
    data:{
      labels:['Recebido','Gasto'],
      datasets:[{
        data:[entrada,saida],
        backgroundColor:['#00c853','#ff5252']
      }]
    }
  });
}
</script>

</body>
</html>
