<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>FluxoZap - Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body {
  margin:0;
  font-family:Arial;
  background:#0b0b0b;
  color:#fff;
}

.top {
  display:flex;
  justify-content:space-between;
  padding:20px;
}

.card {
  background:#111;
  padding:20px;
  border-radius:15px;
  margin:10px;
  flex:1;
}

.grid {
  display:grid;
  grid-template-columns:1fr 1fr;
}

input, select, button {
  width:100%;
  padding:10px;
  margin-top:10px;
  border-radius:10px;
  border:none;
}

button {
  cursor:pointer;
}

.btn-green { background:#00c853; color:white; }
.btn-red { background:#ff1744; color:white; }

.profile {
  text-align:center;
}

.profile img {
  width:80px;
  height:80px;
  border-radius:50%;
  object-fit:cover;
}

canvas {
  max-height:200px;
}
</style>
</head>

<body>

<div class="top">
  <div>
    <h2>FluxoZap</h2>
    <p id="nome">Usuário</p>
  </div>

  <div class="profile">
    <img id="foto" src="" />
    <input type="file" onchange="trocarFoto(event)">
  </div>
</div>

<div class="grid">

<div class="card">
<h3>Saldo</h3>
<p>Total: R$ <span id="saldoTotal">0</span></p>
<p>Mês: R$ <span id="saldoMes">0</span></p>
<p>Hoje: R$ <span id="saldoDia">0</span></p>
</div>

<div class="card">
<h3>Filtro</h3>
<input type="date" id="inicio">
<input type="date" id="fim">
<button onclick="filtrar()">Filtrar</button>
<button onclick="pdf()">Exportar PDF</button>
</div>

<div class="card">
<h3>Receber</h3>
<input type="number" id="entrada">
<button class="btn-green" onclick="addEntrada()">Adicionar</button>

<h3>Gastar</h3>
<input type="number" id="saida">
<select id="categoria">
<option>Alimentação</option>
<option>Gasolina</option>
<option>Energia</option>
<option>Água</option>
<option>Aluguel</option>
<option>Funcionário</option>
<option>Internet</option>
<option>Outros</option>
</select>
<button class="btn-red" onclick="addSaida()">Adicionar</button>
</div>

<div class="card">
<h3>Gráfico</h3>
<canvas id="grafico"></canvas>
</div>

<div class="card">
<h3>Extrato</h3>
<div id="extrato"></div>
</div>

</div>

<script>

let dados = JSON.parse(localStorage.getItem("dados")) || [];

function salvar(){
  localStorage.setItem("dados", JSON.stringify(dados));
}

function atualizar(){

let total=0, mes=0, dia=0;
let hoje = new Date().toISOString().slice(0,10);
let mesAtual = hoje.slice(0,7);

dados.forEach(d=>{
  if(d.tipo=="entrada"){
    total += d.valor;
    if(d.data.startsWith(mesAtual)) mes += d.valor;
    if(d.data==hoje) dia += d.valor;
  } else {
    total -= d.valor;
    if(d.data.startsWith(mesAtual)) mes -= d.valor;
    if(d.data==hoje) dia -= d.valor;
  }
});

document.getElementById("saldoTotal").innerText = total;
document.getElementById("saldoMes").innerText = mes;
document.getElementById("saldoDia").innerText = dia;

let extratoHTML="";
dados.slice().reverse().forEach(d=>{
  extratoHTML += `<p>${d.tipo} R$${d.valor} - ${d.data}</p>`;
});
document.getElementById("extrato").innerHTML = extratoHTML;

grafico(total, mes);
}

function addEntrada(){
let v = Number(document.getElementById("entrada").value);
dados.push({tipo:"entrada", valor:v, data:new Date().toISOString().slice(0,10)});
salvar();
atualizar();
}

function addSaida(){
let v = Number(document.getElementById("saida").value);
dados.push({tipo:"saida", valor:v, data:new Date().toISOString().slice(0,10)});
salvar();
atualizar();
}

function grafico(total, mes){
new Chart(document.getElementById("grafico"), {
type:"doughnut",
data:{
labels:["Total","Mês"],
datasets:[{
data:[total, mes],
backgroundColor:["#00c853","#ff1744"]
}]
}
});
}

function filtrar(){
let i = document.getElementById("inicio").value;
let f = document.getElementById("fim").value;

let filtrado = dados.filter(d=> d.data>=i && d.data<=f);

let html="";
filtrado.forEach(d=>{
html += `<p>${d.tipo} R$${d.valor} - ${d.data}</p>`;
});

document.getElementById("extrato").innerHTML = html;
}

function pdf(){
const { jsPDF } = window.jspdf;
let doc = new jsPDF();

let y=10;

dados.forEach(d=>{
doc.text(`${d.tipo} R$${d.valor} - ${d.data}`,10,y);
y+=10;
});

doc.save("extrato.pdf");
}

function trocarFoto(e){
let file = e.target.files[0];
let reader = new FileReader();

reader.onload = function(){
localStorage.setItem("foto", reader.result);
document.getElementById("foto").src = reader.result;
}

reader.readAsDataURL(file);
}

function carregar(){
document.getElementById("nome").innerText = localStorage.getItem("nome") || "Usuário";
document.getElementById("foto").src = localStorage.getItem("foto") || "";
}

carregar();
atualizar();

</script>

</body>
</html>
