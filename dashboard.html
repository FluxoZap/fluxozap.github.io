<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>FluxoZap</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
  margin:0;
  font-family:'Inter',sans-serif;
  background:#0b0c10;
  color:white;
}

/* HEADER */
.header{
  padding:20px;
}

.saldo{
  font-size:34px;
  font-weight:700;
}

/* BOTÕES RÁPIDOS */
.actions{
  display:flex;
  gap:10px;
  padding:10px 20px;
}

.actions button{
  flex:1;
  padding:14px;
  border:none;
  border-radius:12px;
  font-weight:bold;
}

.receber{background:#00c853;}
.gastar{background:#ff1744;}

/* CARDS */
.card{
  background:#15171c;
  margin:15px;
  padding:15px;
  border-radius:15px;
}

/* INPUT */
input,select{
  width:100%;
  padding:12px;
  border:none;
  border-radius:10px;
  background:#222;
  color:white;
  margin-top:10px;
}

/* BARRA */
.barra{
  height:10px;
  background:#333;
  border-radius:10px;
  margin-top:10px;
}

.barra div{
  height:10px;
  background:#00c853;
  border-radius:10px;
}

/* LISTA */
.item{
  margin-top:10px;
}

/* MOBILE FIRST */
</style>
</head>

<body>

<!-- HEADER -->
<div class="header">
  <div>Olá</div>
  <div class="saldo">R$ <span id="saldo">0</span></div>
</div>

<!-- AÇÕES -->
<div class="actions">
  <button class="receber" onclick="mostrarEntrada()">Receber</button>
  <button class="gastar" onclick="mostrarSaida()">Gastar</button>
</div>

<!-- INPUT DINÂMICO -->
<div class="card" id="areaInput" style="display:none;">
  <input id="valor" type="number" placeholder="Valor">
  <select id="categoria">
    <option>Alimentação</option>
    <option>Transporte</option>
    <option>Contas</option>
    <option>Lazer</option>
    <option>Outros</option>
  </select>
  <button onclick="confirmar()">Confirmar</button>
</div>

<!-- ORÇAMENTO -->
<div class="card">
  <h3>Orçamento mensal</h3>
  <input id="orcamentoInput" placeholder="Definir orçamento">
  <button onclick="salvarOrcamento()">Salvar</button>

  <div>Usado: R$ <span id="usado">0</span></div>
  <div>Restante: R$ <span id="restante">0</span></div>

  <div class="barra">
    <div id="barra"></div>
  </div>

  <small id="alerta"></small>
</div>

<!-- GRÁFICO -->
<div class="card">
  <canvas id="grafico"></canvas>
</div>

<!-- EXTRATO -->
<div class="card">
  <h3>Extrato</h3>
  <div id="lista"></div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs, query, where } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const firebaseConfig={
  apiKey:"AIzaSyAh0Qi4lm-ZXQLe4YAca8wYbp5kcU6lY3I",
  authDomain:"fluxozap-10ead.firebaseapp.com",
  projectId:"fluxozap-10ead"
};

const app=initializeApp(firebaseConfig);
const db=getFirestore(app);
const auth=getAuth(app);

let userId="";
let tipo="";
let chart;
let orcamento=0;

onAuthStateChanged(auth,user=>{
  if(user){
    userId=user.uid;
    carregar();
  }else{
    window.location.href="index.html";
  }
});

window.mostrarEntrada=()=>{tipo="entrada";areaInput.style.display="block";}
window.mostrarSaida=()=>{tipo="saida";areaInput.style.display="block";}

window.confirmar=async()=>{
  let v=parseFloat(valor.value);
  let cat=categoria.value;

  await addDoc(collection(db,"movimentos"),{
    tipo,valor:v,categoria:cat,data:new Date().toISOString(),userId
  });

  areaInput.style.display="none";
  valor.value="";
  carregar();
}

window.salvarOrcamento=async()=>{
  let v=parseFloat(orcamentoInput.value);
  await addDoc(collection(db,"configuracao"),{userId,orcamentoMensal:v});
  carregar();
}

async function carregar(){

  let saldo=0,entrada=0,saida=0;
  let lista=document.getElementById("lista");
  lista.innerHTML="";

  const q=query(collection(db,"movimentos"),where("userId","==",userId));
  const docs=await getDocs(q);

  docs.forEach(doc=>{
    let d=doc.data();

    if(d.tipo==="entrada"){saldo+=d.valor;entrada+=d.valor;}
    else{saldo-=d.valor;saida+=d.valor;}

    lista.innerHTML+=`
      <div class="item">
        ${d.tipo==="entrada"?"Entrada":"Saída"} - ${d.categoria}
        <br>R$ ${d.valor}
      </div>
    `;
  });

  saldoEl.innerText=saldo;

  // orçamento
  const q2=query(collection(db,"configuracao"),where("userId","==",userId));
  const snap=await getDocs(q2);

  snap.forEach(doc=>orcamento=doc.data().orcamentoMensal);

  let perc=orcamento? (saida/orcamento)*100:0;

  usado.innerText=saida;
  restante.innerText=orcamento-saida;
  barra.style.width=perc+"%";

  if(perc>=100) alerta.innerText="Estourou orçamento!";
  else if(perc>=75) alerta.innerText="Cuidado: 75% usado";
  else alerta.innerText="";

  // gráfico
  if(chart) chart.destroy();

  chart=new Chart(grafico,{
    type:"doughnut",
    data:{
      labels:["Recebido","Gasto"],
      datasets:[{data:[entrada,saida]}]
    }
  });
}
</script>

</body>
</html>
