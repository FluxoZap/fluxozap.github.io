<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>FluxoZap - Empresa</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body{
margin:0;
font-family:Arial;
background:#0b0b0b;
color:white;
display:flex;
}

/* MENU */
.menu{
width:230px;
background:#0f0f0f;
padding:20px;
height:100vh;
}

.menu h2{
color:#7c4dff;
}

.menu a{
display:block;
color:#aaa;
margin:15px 0;
text-decoration:none;
}

/* CONTEUDO */
.main{
flex:1;
padding:20px;
}

.top{
display:flex;
justify-content:space-between;
align-items:center;
}

.profile{
display:flex;
align-items:center;
gap:10px;
}

.profile img{
width:50px;
height:50px;
border-radius:50%;
}

/* CARDS */
.cards{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:15px;
margin-top:20px;
}

.card{
background:#111;
padding:20px;
border-radius:15px;
}

/* GRID */
.grid{
display:grid;
grid-template-columns:2fr 1fr;
gap:15px;
margin-top:20px;
}

input,select,button{
width:100%;
padding:10px;
margin-top:10px;
border-radius:10px;
border:none;
}

.btn-green{background:#00c853;color:white;}
.btn-red{background:#ff1744;color:white;}

.extrato p{
border-bottom:1px solid #222;
padding:5px 0;
}
</style>
</head>

<body>

<div class="menu">
<h2>FluxoZap</h2>
<a>Dashboard</a>
<a>Movimentações</a>
<a>Relatórios</a>
<a>Funcionários</a>
<a>Configurações</a>
</div>

<div class="main">

<div class="top">
<div>
<h2>Dashboard</h2>
<p id="nome"></p>
</div>

<div class="profile">
<img id="foto">
<input type="file" onchange="foto(event)">
</div>
</div>

<!-- CARDS -->
<div class="cards">
<div class="card">Saldo Total<br><b id="total">0</b></div>
<div class="card">Entradas Mês<br><b id="entradaMes">0</b></div>
<div class="card">Saídas Mês<br><b id="saidaMes">0</b></div>
<div class="card">Saldo Hoje<br><b id="dia">0</b></div>
</div>

<!-- GRID -->
<div class="grid">

<div class="card">
<h3>Movimentar</h3>

<input id="entrada" placeholder="Entrada">
<button class="btn-green" onclick="addEntrada()">Adicionar</button>

<input id="saida" placeholder="Saída">
<select id="cat">
<option>Alimentação</option>
<option>Gasolina</option>
<option>Energia</option>
<option>Água</option>
<option>Aluguel</option>
<option>Funcionário</option>
<option>Internet</option>
<option>Outros</option>
</select>
<button class="btn-red" onclick="addSaida()">Adicionar</button>

</div>

<div class="card">
<h3>Filtro</h3>
<input type="date" id="i">
<input type="date" id="f">
<button onclick="filtrar()">Filtrar</button>
<button onclick="pdf()">PDF</button>
</div>

</div>

<div class="grid">

<div class="card">
<canvas id="grafico"></canvas>
</div>

<div class="card extrato">
<h3>Extrato</h3>
<div id="lista"></div>
</div>

</div>

</div>

<script>

let dados = JSON.parse(localStorage.getItem("dados"))||[];

function salvar(){localStorage.setItem("dados",JSON.stringify(dados));}

function atualizar(){

let total=0, entradaMes=0, saidaMes=0, dia=0;
let hoje=new Date().toISOString().slice(0,10);
let mes=hoje.slice(0,7);

dados.forEach(d=>{
if(d.tipo=="entrada"){
total+=d.valor;
if(d.data.startsWith(mes)) entradaMes+=d.valor;
if(d.data==hoje) dia+=d.valor;
}else{
total-=d.valor;
if(d.data.startsWith(mes)) saidaMes+=d.valor;
if(d.data==hoje) dia-=d.valor;
}
});

document.getElementById("total").innerText=total;
document.getElementById("entradaMes").innerText=entradaMes;
document.getElementById("saidaMes").innerText=saidaMes;
document.getElementById("dia").innerText=dia;

let html="";
dados.slice().reverse().forEach(d=>{
html+=`<p>${d.tipo} R$${d.valor} - ${d.data}</p>`;
});
document.getElementById("lista").innerHTML=html;

grafico(entradaMes,saidaMes);
}

function addEntrada(){
let v=Number(document.getElementById("entrada").value);
dados.push({tipo:"entrada",valor:v,data:new Date().toISOString().slice(0,10)});
salvar();atualizar();
}

function addSaida(){
let v=Number(document.getElementById("saida").value);
dados.push({tipo:"saida",valor:v,data:new Date().toISOString().slice(0,10)});
salvar();atualizar();
}

function grafico(e,s){
new Chart(document.getElementById("grafico"),{
type:"bar",
data:{labels:["Entradas","Saídas"],datasets:[{data:[e,s]}]}
});
}

function filtrar(){
let i=document.getElementById("i").value;
let f=document.getElementById("f").value;

let filtrado=dados.filter(d=>d.data>=i && d.data<=f);

let html="";
filtrado.forEach(d=>{
html+=`<p>${d.tipo} R$${d.valor} - ${d.data}</p>`;
});
document.getElementById("lista").innerHTML=html;
}

function pdf(){
const { jsPDF } = window.jspdf;
let doc=new jsPDF();
let y=10;

dados.forEach(d=>{
doc.text(`${d.tipo} R$${d.valor}`,10,y);
y+=10;
});

doc.save("extrato.pdf");
}

function foto(e){
let file=e.target.files[0];
let r=new FileReader();
r.onload=()=>{
localStorage.setItem("foto",r.result);
document.getElementById("foto").src=r.result;
}
r.readAsDataURL(file);
}

function carregar(){
document.getElementById("nome").innerText=localStorage.getItem("nome")||"Usuário";
document.getElementById("foto").src=localStorage.getItem("foto")||"";
}

carregar();
atualizar();

</script>

</body>
</html>
