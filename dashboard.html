<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>FluxoZap</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
 background:#0f0f14;
 color:white;
 font-family:Arial;
 margin:0;
}

.topo{
 background:#6a00ff;
 padding:20px;
}

.container{
 padding:15px;
 display:grid;
 gap:15px;
}

.card{
 background:#1c1c25;
 padding:15px;
 border-radius:15px;
}

input{
 width:100%;
 padding:10px;
 margin-top:10px;
 background:#2a2a35;
 border:none;
 border-radius:8px;
 color:white;
}

button{
 width:100%;
 padding:10px;
 margin-top:10px;
 border:none;
 border-radius:8px;
 font-weight:bold;
}

.green{background:#00c853;}
.red{background:#ff1744;}
</style>
</head>

<body>

<div class="topo">
<h2 id="usuario"></h2>
<h1>R$ <span id="saldo">0</span></h1>
</div>

<div class="container">

<div class="card">
<h3>Entrada</h3>
<input id="entrada">
<button class="green" onclick="addEntrada()">Adicionar</button>

<h3>Saída</h3>
<input id="saida">
<button class="red" onclick="addSaida()">Adicionar</button>
</div>

<div class="card">
<canvas id="grafico"></canvas>
</div>

<div class="card">
<h3>Extrato</h3>
<div id="lista"></div>
</div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, addDoc, onSnapshot, query, where } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const firebaseConfig={
 apiKey:"AIzaSyAh0Qi4lm-ZXQLe4YAca8wYbp5kcU6lY3I",
 authDomain:"fluxozap-10ead.firebaseapp.com",
 projectId:"fluxozap-10ead"
};

const app=initializeApp(firebaseConfig);
const db=getFirestore(app);
const auth=getAuth(app);

let chart;

onAuthStateChanged(auth,user=>{
 if(user){
  usuario.innerText=user.email;
  carregar(user.uid);
 }
});

function carregar(uid){
 const q=query(collection(db,"movimentos"),where("userId","==",uid));

 onSnapshot(q,(snapshot)=>{

  let saldo=0;
  let entrada=0;
  let saida=0;

  lista.innerHTML="";

  snapshot.forEach(doc=>{
   let d=doc.data();
   let valor = Number(d.valor) || 0;

   if(d.tipo==="entrada"){
    saldo += valor;
    entrada += valor;
   }else{
    saldo -= valor;
    saida += valor;
   }

   lista.innerHTML += `<div>${d.tipo} R$ ${valor}</div>`;
  });

  document.getElementById("saldo").innerText = saldo;

  atualizarGrafico(entrada,saida);
 });
}

window.addEntrada = async()=>{
 let v=Number(document.getElementById("entrada").value);

 await addDoc(collection(db,"movimentos"),{
  tipo:"entrada",
  valor:v,
  data:new Date(),
  userId:auth.currentUser.uid
 });
}

window.addSaida = async()=>{
 let v=Number(document.getElementById("saida").value);

 await addDoc(collection(db,"movimentos"),{
  tipo:"saida",
  valor:v,
  data:new Date(),
  userId:auth.currentUser.uid
 });
}

function atualizarGrafico(ent, sai){
 const ctx=document.getElementById("grafico");

 if(chart) chart.destroy();

 chart=new Chart(ctx,{
  type:"doughnut",
  data:{
   labels:["Entrada","Saída"],
   datasets:[{
    data:[ent,sai],
    backgroundColor:["green","red"]
   }]
  }
 });
}
</script>

</body>
</html>
