<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>FluxoZap</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
  margin:0;
  font-family:'Inter',sans-serif;
  background:#0f1115;
  color:white;
}

/* ===== DESKTOP ===== */
.container{
  display:flex;
  height:100vh;
}

/* MENU LATERAL */
.sidebar{
  width:240px;
  background:#15171c;
  padding:20px;
}

.sidebar h2{
  font-size:20px;
}

.sidebar div{
  margin-top:15px;
  color:#aaa;
  cursor:pointer;
}

/* MAIN DESKTOP */
.main{
  flex:1;
  padding:20px;
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:20px;
}

/* BLOCO */
.bloco{
  background:#1a1d23;
  padding:18px;
  border-radius:15px;
}

/* SALDO */
.saldo{
  font-size:40px;
  font-weight:bold;
}

/* INPUTS */
input{
  padding:12px;
  border-radius:10px;
  border:none;
  background:#2a2d35;
  color:white;
}

button{
  padding:12px;
  border:none;
  border-radius:10px;
  font-weight:bold;
  cursor:pointer;
}

.recebi{background:#00c853;}
.gastei{background:#d50000;}

/* ALERTA */
.alerta{
  background:#ff1744;
  padding:10px;
  border-radius:10px;
  margin-top:10px;
  display:none;
}

/* EXTRATO */
.item{
  margin-top:10px;
  font-size:14px;
}

/* GRAFICO */
canvas{
  max-height:200px;
}

/* ===== MOBILE ===== */
@media (max-width: 900px){

.container{
  flex-direction:column;
}

/* menu vira topo */
.sidebar{
  width:100%;
  display:flex;
  justify-content:space-around;
  padding:15px;
}

/* vira 1 coluna */
.main{
  grid-template-columns:1fr;
}

/* botões maiores estilo app */
button{
  width:100%;
  margin-top:5px;
}

input{
  width:100%;
  margin-top:5px;
}
}
</style>
</head>

<body>

<div class="container">

<!-- MENU -->
<div class="sidebar">
  <h2>FluxoZap</h2>
  <div>Dashboard</div>
  <div>Extrato</div>
  <div>Conta</div>
</div>

<!-- CONTEÚDO -->
<div class="main">

<!-- SALDO -->
<div class="bloco">
  <div>Saldo Total</div>
  <div class="saldo">R$ <span id="saldo">0.00</span></div>
  <div id="alerta" class="alerta">⚠️ Você já gastou 75% do seu saldo!</div>
</div>

<!-- CONTA -->
<div class="bloco">
  <div id="nomeUsuario">Usuário</div>
  <small>Conta</small>
</div>

<!-- MOVIMENTOS -->
<div class="bloco">
  <h3>Recebimento</h3>
  <input id="entradaValor" type="number" placeholder="Valor recebido">
  <button class="recebi" onclick="addEntrada()">Receber</button>

  <h3 style="margin-top:15px;">Gasto</h3>
  <input id="saidaValor" type="number" placeholder="Valor gasto">
  <button class="gastei" onclick="addSaida()">Gastar</button>
</div>

<!-- GRAFICO + EXTRATO -->
<div class="bloco">
  <h3>Orçamento mensal</h3>

  <input id="orcamentoInput" type="number" placeholder="Definir orçamento mensal">
  <button onclick="salvarOrcamento()" class="recebi">Salvar</button>

  <div style="margin-top:15px;">
    <div>Usado: R$ <span id="usado">0</span></div>
    <div>Restante: R$ <span id="restante">0</span></div>
  </div>

  <div style="background:#333;height:10px;border-radius:10px;margin-top:10px;">
    <div id="barra" style="height:10px;background:#00c853;width:0%;border-radius:10px;"></div>
  </div>

  <small id="alertaOrcamento"></small>
</div>
  <div id="percentual"></div>
  <hr style="border-color:#333;">
  <div id="lista"></div>
</div>

</div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs, query, where } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyAh0Qi4lm-ZXQLe4YAca8wYbp5kcU6lY3I",
  authDomain: "fluxozap-10ead.firebaseapp.com",
  projectId: "fluxozap-10ead"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

let userId="";
let chart;

onAuthStateChanged(auth,(user)=>{
  if(user){
    userId=user.uid;
    document.getElementById("nomeUsuario").innerText=user.email;
    carregar();
  }else{
    window.location.href="index.html";
  }
});

window.addEntrada=async function(){
  let v=parseFloat(document.getElementById("entradaValor").value);
  if(!v) return;

  await addDoc(collection(db,"movimentos"),{
    tipo:"entrada",
    valor:v,
    data:new Date().toISOString(),
    userId
  });

  carregar();
}

window.addSaida=async function(){
  let v=parseFloat(document.getElementById("saidaValor").value);
  if(!v) return;

  await addDoc(collection(db,"movimentos"),{
    tipo:"saida",
    valor:v,
    data:new Date().toISOString(),
    userId
  });

  carregar();
}

async function carregar(){
  let saldo=0,entrada=0,saida=0;

  let lista=document.getElementById("lista");
  lista.innerHTML="";

  const q=query(collection(db,"movimentos"),where("userId","==",userId));
  const docs=await getDocs(q);

  docs.forEach(doc=>{
    let d=doc.data();

    if(d.tipo==="entrada"){saldo+=d.valor;entrada+=d.valor;}
    else{saldo-=d.valor;saida+=d.valor;}

    lista.innerHTML+=`
      <div class="item">
        ${d.tipo==="entrada"?"Entrada":"Saída"} - ${new Date(d.data).toLocaleString()}
        <br>
        <strong style="color:${d.tipo==="entrada"?"#00e676":"#ff5252"}">
          R$ ${d.valor.toFixed(2)}
        </strong>
      </div>
    `;
  });

  document.getElementById("saldo").innerText=saldo.toFixed(2);

  let alerta=document.getElementById("alerta");
  let percGasto=entrada? (saida/entrada)*100 : 0;
  alerta.style.display = percGasto>=75 ? "block":"none";

  let total=entrada+saida;
  let perc=total?((entrada/total)*100).toFixed(1):0;
  document.getElementById("percentual").innerText="Positivo: "+perc+"%";

  const ctx=document.getElementById("grafico");
  if(chart) chart.destroy();

  chart=new Chart(ctx,{
    type:'doughnut',
    data:{
      labels:['Recebido','Gasto'],
      datasets:[{
        data:[entrada,saida],
        backgroundColor:['#00c853','#ff5252']
      }]
    }
  });
}
</script>

</body>
</html>
