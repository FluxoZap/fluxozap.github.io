<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>FluxoZap</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0b0c10;
  color:white;
}

.container{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:20px;
  padding:20px;
}

.card{
  background:#15171c;
  padding:20px;
  border-radius:15px;
}

input,select{
  width:100%;
  padding:10px;
  margin-top:10px;
  background:#222;
  border:none;
  border-radius:8px;
  color:white;
}

button{
  width:100%;
  padding:10px;
  margin-top:10px;
  border:none;
  border-radius:8px;
  font-weight:bold;
}

.green{background:#00c853;}
.red{background:#ff1744;}
.gray{background:#333;}

canvas{max-height:200px;}
</style>
</head>

<body>

<div class="container">

<div class="card">
  <h2>Saldo Total</h2>
  <h1 id="saldoTotal">R$ 0</h1>

  <h3>Hoje: R$ <span id="saldoDia">0</span></h3>
  <h3>Mês: R$ <span id="saldoMes">0</span></h3>
</div>

<div class="card">
  <h3 id="usuario"></h3>
</div>

<div class="card">
  <h3>Receber</h3>
  <input id="entradaValor" type="number">
  <button class="green" onclick="addEntrada()">Adicionar</button>

  <h3>Gastar</h3>
  <input id="saidaValor" type="number">
  <select id="categoria">
    <option>Alimentação</option>
    <option>Transporte</option>
    <option>Contas</option>
  </select>
  <button class="red" onclick="addSaida()">Adicionar</button>
</div>

<div class="card">
  <h3>Meta mensal</h3>
  <input id="metaValor" placeholder="Digite meta">
  <button onclick="salvarMeta()">Salvar</button>

  <p>Usado: R$ <span id="usado">0</span></p>
  <p>Restante: R$ <span id="restante">0</span></p>
</div>

<div class="card">
  <h3>Filtro</h3>
  <input type="date" id="dataInicio">
  <input type="date" id="dataFim">
  <button class="gray" onclick="filtrar()">Filtrar</button>
  <button class="gray" onclick="gerarPDF()">Exportar PDF</button>
</div>

<div class="card">
  <canvas id="grafico"></canvas>
</div>

<div class="card">
  <h3>Extrato</h3>
  <div id="lista"></div>
</div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, addDoc, onSnapshot, query, where } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const firebaseConfig={
 apiKey:"AIzaSyAh0Qi4lm-ZXQLe4YAca8wYbp5kcU6lY3I",
 authDomain:"fluxozap-10ead.firebaseapp.com",
 projectId:"fluxozap-10ead"
};

const app=initializeApp(firebaseConfig);
const db=getFirestore(app);
const auth=getAuth(app);

let chart;
let dados=[];

onAuthStateChanged(auth,user=>{
 if(user){
  usuario.innerText=user.email;
  carregar(user.uid);
 }else{
  window.location.href="index.html";
 }
});

window.addEntrada=async()=>{
 let v=parseFloat(entradaValor.value);
 if(!v)return;

 await addDoc(collection(db,"movimentos"),{
  tipo:"Entrada",
  valor:v,
  data:new Date().toISOString(),
  userId:auth.currentUser.uid
 });
}

window.addSaida=async()=>{
 let v=parseFloat(saidaValor.value);
 if(!v)return;

 await addDoc(collection(db,"movimentos"),{
  tipo:"Saída",
  valor:v,
  data:new Date().toISOString(),
  userId:auth.currentUser.uid
 });
}

window.salvarMeta=()=>{
 localStorage.setItem("meta",metaValor.value);
 atualizarMeta(0);
}

function carregar(uid){
 const q=query(collection(db,"movimentos"),where("userId","==",uid));

 onSnapshot(q,snapshot=>{
  let saldo=0,entrada=0,saida=0;
  let hoje=new Date().toDateString();
  let mesAtual=new Date().getMonth();

  let saldoDia=0;
  let saldoMes=0;

  lista.innerHTML="";
  dados=[];

  snapshot.forEach(doc=>{
   let d=doc.data();
   let data=new Date(d.data);
   dados.push(d);

   if(d.tipo==="Entrada"){
    saldo+=d.valor;
    entrada+=d.valor;
   }else{
    saldo-=d.valor;
    saida+=d.valor;
   }

   if(data.toDateString()===hoje){
    saldoDia += d.tipo==="Entrada"?d.valor:-d.valor;
   }

   if(data.getMonth()===mesAtual){
    saldoMes += d.tipo==="Entrada"?d.valor:-d.valor;
   }

   lista.innerHTML+=`
    <div>
    ${d.tipo} - R$ ${d.valor} <br>
    ${data.toLocaleDateString()}
    </div><hr>
   `;
  });

  saldoTotal.innerText="R$ "+saldo;
  saldoDia.innerText=saldoDia;
  saldoMes.innerText=saldoMes;

  atualizarGrafico(entrada,saida);
  atualizarMeta(saida);
 });
}

function atualizarGrafico(ent, sai){
 const ctx=document.getElementById("grafico");

 if(chart)chart.destroy();

 chart=new Chart(ctx,{
  type:"doughnut",
  data:{
   labels:["Recebido","Gasto"],
   datasets:[{
    data:[ent,sai],
    backgroundColor:["#00c853","#ff1744"]
   }]
  }
 });
}

function atualizarMeta(gasto){
 let meta=parseFloat(localStorage.getItem("meta"))||0;

 usado.innerText=gasto;
 restante.innerText=meta-gasto;

 if(meta>0 && gasto>=meta*0.75){
  alert("⚠️ Você já gastou 75% da sua meta!");
 }
}

window.filtrar=()=>{
 lista.innerHTML="";
 let inicio=new Date(dataInicio.value);
 let fim=new Date(dataFim.value);

 dados.forEach(d=>{
  let dt=new Date(d.data);
  if(dt>=inicio && dt<=fim){
   lista.innerHTML+=`
   <div>${d.tipo} - R$ ${d.valor}</div><hr>
   `;
  }
 });
}

window.gerarPDF=()=>{
 const { jsPDF } = window.jspdf;
 const doc = new jsPDF();

 let y=10;

 dados.forEach(d=>{
  doc.text(`${d.tipo} - R$ ${d.valor}`,10,y);
  y+=10;
 });

 doc.save("extrato.pdf");
}
</script>

</body>
</html>
