<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>FluxoZap</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
  margin:0;
  font-family:'Inter',sans-serif;
  background:#0f1115; /* fundo escuro uniforme */
  color:white;
}

/* LAYOUT */
.container{
  display:flex;
  height:100vh;
}

/* MENU LATERAL */
.sidebar{
  width:220px;
  background:#15171c;
  padding:20px;
}

.sidebar h2{
  font-size:20px;
}

.sidebar div{
  margin-top:20px;
  cursor:pointer;
  color:#bbb;
}

/* CONTEÚDO */
.main{
  flex:1;
  padding:25px;
  overflow:auto;
}

/* BLOCOS */
.bloco{
  background:#1a1d23;
  padding:20px;
  border-radius:15px;
  margin-bottom:20px;
}

/* SALDO */
.saldo{
  font-size:40px;
  font-weight:bold;
}

/* INPUT */
input{
  padding:12px;
  border-radius:10px;
  border:none;
  background:#2a2d35;
  color:white;
  margin-right:10px;
}

/* BOTÕES */
button{
  padding:12px;
  border:none;
  border-radius:10px;
  font-weight:bold;
}

.recebi{background:#00c853;}
.gastei{background:#d50000;}

/* ALERTA */
.alerta{
  background:#ff1744;
  padding:10px;
  border-radius:10px;
  margin-top:10px;
  display:none;
}

/* EXTRATO */
.item{
  margin-top:10px;
}
</style>
</head>

<body>

<div class="container">

<!-- MENU -->
<div class="sidebar">
  <h2>FluxoZap</h2>

  <div>Dashboard</div>
  <div>Extrato</div>
  <div>Conta</div>
</div>

<!-- CONTEÚDO -->
<div class="main">

<div class="bloco">
  <div>Saldo Total</div>
  <div class="saldo">R$ <span id="saldo">0.00</span></div>
  <div id="alerta" class="alerta">⚠️ Você já gastou mais de 75% do mês!</div>
</div>

<div class="bloco">
  <input type="number" id="entradaValor" placeholder="Recebido">
  <button class="recebi" onclick="addEntrada()">+</button>

  <br><br>

  <input type="number" id="saidaValor" placeholder="Gasto">
  <button class="gastei" onclick="addSaida()">-</button>
</div>

<div class="bloco">

  <!-- FILTRO -->
  <input type="date" id="dataInicio">
  <input type="date" id="dataFim">
  <button onclick="carregar()">Filtrar</button>

  <canvas id="grafico"></canvas>
  <div id="percentual"></div>

  <div id="lista"></div>

</div>

</div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs, query, where } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyAh0Qi4lm-ZXQLe4YAca8wYbp5kcU6lY3I",
  authDomain: "fluxozap-10ead.firebaseapp.com",
  projectId: "fluxozap-10ead"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

let userId="";
let chart;

onAuthStateChanged(auth,(user)=>{
  if(user){
    userId=user.uid;
    carregar();
  }else{
    window.location.href="index.html";
  }
});

window.addEntrada=async function(){
  let valor=parseFloat(document.getElementById("entradaValor").value);
  if(!valor) return;

  await addDoc(collection(db,"movimentos"),{
    tipo:"entrada",
    valor,
    data:new Date().toISOString(),
    userId
  });

  carregar();
}

window.addSaida=async function(){
  let valor=parseFloat(document.getElementById("saidaValor").value);
  if(!valor) return;

  await addDoc(collection(db,"movimentos"),{
    tipo:"saida",
    valor,
    data:new Date().toISOString(),
    userId
  });

  carregar();
}

async function carregar(){
  let saldo=0,entrada=0,saida=0;
  let lista=document.getElementById("lista");
  lista.innerHTML="";

  let inicio=document.getElementById("dataInicio").value;
  let fim=document.getElementById("dataFim").value;

  const q=query(collection(db,"movimentos"),where("userId","==",userId));
  const docs=await getDocs(q);

  docs.forEach(doc=>{
    let d=doc.data();

    if(inicio && d.data < inicio) return;
    if(fim && d.data > fim) return;

    if(d.tipo==="entrada"){saldo+=d.valor;entrada+=d.valor;}
    else{saldo-=d.valor;saida+=d.valor;}

    lista.innerHTML+=`
      <div class="item">
        ${d.tipo==="entrada"?"Entrada":"Saída"} - ${new Date(d.data).toLocaleString()}
        <br>
        <strong style="color:${d.tipo==="entrada"?"#00e676":"#ff5252"}">
        R$ ${d.valor.toFixed(2)}
        </strong>
      </div>
    `;
  });

  document.getElementById("saldo").innerText=saldo.toFixed(2);

  // ALERTA 75%
  let percGasto = entrada ? (saida/entrada)*100 : 0;
  document.getElementById("alerta").style.display =
    percGasto >= 75 ? "block" : "none";

  // porcentagem positiva
  let total=entrada+saida;
  let perc=total?((entrada/total)*100).toFixed(1):0;
  document.getElementById("percentual").innerText="Positivo: "+perc+"%";

  const ctx=document.getElementById("grafico");
  if(chart) chart.destroy();

  chart=new Chart(ctx,{
    type:'doughnut',
    data:{
      labels:['Recebido','Gasto'],
      datasets:[{
        data:[entrada,saida],
        backgroundColor:['#00c853','#ff5252']
      }]
    }
  });
}
</script>

</body>
</html>
