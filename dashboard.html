<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>FluxoZap</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Inter', sans-serif;
  background: #0d0d0d;
  color: white;
}

.app {
  max-width: 420px;
  margin: auto;
  padding: 20px;
}

/* TOPO */
.topo {
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.logo {
  font-weight: 600;
  font-size: 18px;
}

.perfil {
  display: flex;
  align-items: center;
  gap: 10px;
  cursor: pointer;
}

.foto {
  width: 38px;
  height: 38px;
  border-radius: 50%;
  background: #222;
  display: flex;
  align-items: center;
  justify-content: center;
}

.menu {
  position: absolute;
  right: 20px;
  top: 70px;
  background: #1a1a1a;
  border-radius: 10px;
  display: none;
  padding: 10px;
}

.menu div {
  padding: 10px;
  cursor: pointer;
}

.menu div:hover {
  background: #333;
}

/* CARD */
.card {
  margin-top: 25px;
  background: linear-gradient(135deg, #6a1b9a, #4a148c);
  padding: 25px;
  border-radius: 20px;
}

.saldo {
  font-size: 34px;
  font-weight: 600;
}

/* BOTÕES */
.acoes {
  display: flex;
  gap: 10px;
  margin-top: 20px;
}

.btn {
  flex: 1;
  padding: 15px;
  border-radius: 15px;
  border: none;
  font-weight: 600;
  cursor: pointer;
}

.recebi { background: #00c853; }
.gastei { background: #d50000; }

/* EXTRATO */
.item {
  background: #1a1a1a;
  padding: 12px;
  border-radius: 10px;
  margin-top: 10px;
}

.entrada { color: #00e676; }
.saida { color: #ff5252; }

/* MODAL */
.modal {
  position: fixed;
  bottom: 0;
  width: 100%;
  max-width: 420px;
  background: #111;
  border-radius: 20px 20px 0 0;
  padding: 20px;
  display: none;
}

.modal input {
  width: 100%;
  padding: 15px;
  border-radius: 10px;
  border: none;
  margin-top: 10px;
  background: #222;
  color: white;
}

.modal button {
  width: 100%;
  padding: 15px;
  margin-top: 10px;
  border: none;
  border-radius: 10px;
  font-weight: bold;
}
</style>
</head>

<body>

<div class="app">

<div class="topo">
  <div class="logo">FluxoZap</div>

  <div class="perfil" onclick="toggleMenu()">
    <div id="nomeUsuario">Conta</div>
    <div class="foto">👤</div>
  </div>
</div>

<div class="menu" id="menu">
  <div onclick="logout()">Sair</div>
  <div>Alterar dados</div>
  <div>Pagamento</div>
</div>

<div class="card">
  <div>Saldo disponível</div>
  <div class="saldo">R$ <span id="saldo">0.00</span></div>
</div>

<div class="acoes">
  <button class="btn recebi" onclick="abrirModal('entrada')">Recebi</button>
  <button class="btn gastei" onclick="abrirModal('saida')">Gastei</button>
</div>

<div id="lista"></div>

</div>

<div class="modal" id="modal">
  <h3 id="tituloModal"></h3>
  <input type="number" id="valor" placeholder="Digite o valor">
  <button onclick="salvar()">Confirmar</button>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs, query, where } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyAh0Qi4lm-ZXQLe4YAca8wYbp5kcU6lY3I",
  authDomain: "fluxozap-10ead.firebaseapp.com",
  projectId: "fluxozap-10ead"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

let tipoAtual = "";
let userId = "";

onAuthStateChanged(auth, (user) => {
  if (user) {
    userId = user.uid;
    carregar();
  } else {
    window.location.href = "index.html";
  }
});

window.toggleMenu = function() {
  let m = document.getElementById("menu");
  m.style.display = m.style.display === "block" ? "none" : "block";
}

window.logout = function() {
  signOut(auth);
}

window.abrirModal = function(tipo) {
  tipoAtual = tipo;
  document.getElementById("modal").style.display = "block";
  document.getElementById("tituloModal").innerText = tipo === "entrada" ? "Recebimento" : "Gasto";
}

window.salvar = async function() {
  let valor = parseFloat(document.getElementById("valor").value);
  if (!valor) return;

  await addDoc(collection(db, "movimentos"), {
    tipo: tipoAtual,
    valor,
    data: new Date().toLocaleString(),
    userId
  });

  document.getElementById("modal").style.display = "none";
  document.getElementById("valor").value = "";

  carregar();
}

async function carregar() {
  let saldo = 0;
  let lista = document.getElementById("lista");
  lista.innerHTML = "";

  const q = query(collection(db, "movimentos"), where("userId", "==", userId));
  const docs = await getDocs(q);

  docs.forEach(doc => {
    let d = doc.data();

    if (d.tipo === "entrada") saldo += d.valor;
    else saldo -= d.valor;

    lista.innerHTML += `
      <div class="item">
        <div>${d.tipo === "entrada" ? "Entrada" : "Saída"} - ${d.data}</div>
        <div class="${d.tipo === "entrada" ? "entrada" : "saida"}">
          R$ ${d.valor.toFixed(2)}
        </div>
      </div>
    `;
  });

  document.getElementById("saldo").innerText = saldo.toFixed(2);
}
</script>

</body>
</html>
