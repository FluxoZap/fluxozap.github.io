<script type="module">
import { db, auth } from "./firebase.js";
import { collection, addDoc, getDocs, query, where } 
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
import { onAuthStateChanged } 
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

let saldo = 0;
let userId = null;

onAuthStateChanged(auth, (user) => {
  if (user) {
    userId = user.uid;
    carregar();
  } else {
    window.location = "index.html";
  }
});

window.entrada = async function() {
  let desc = document.getElementById("desc").value;
  let valor = parseFloat(document.getElementById("valor").value);

  if (!valor) return alert("Digite um valor");

  await addDoc(collection(db, "movimentos"), {
    tipo: "entrada",
    desc,
    valor,
    userId
  });

  carregar();
}

window.saida = async function() {
  let desc = document.getElementById("desc").value;
  let valor = parseFloat(document.getElementById("valor").value);

  if (!valor) return alert("Digite um valor");

  await addDoc(collection(db, "movimentos"), {
    tipo: "saida",
    desc,
    valor,
    userId
  });

  carregar();
}

async function carregar() {
  saldo = 0;
  let lista = document.getElementById("lista");
  lista.innerHTML = "";

  const q = query(collection(db, "movimentos"), where("userId", "==", userId));
  const querySnapshot = await getDocs(q);

  querySnapshot.forEach(doc => {
    let d = doc.data();

    if (d.tipo === "entrada") saldo += d.valor;
    else saldo -= d.valor;

    lista.innerHTML += `
      <p>${d.tipo} - ${d.desc} - R$ ${d.valor.toFixed(2)}</p>
    `;
  });

  document.getElementById("saldo").innerText = saldo.toFixed(2);
}
</script>
