<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>FluxoZap</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
 margin:0;
 font-family:Arial;
 background:#0f0f14;
 color:white;
}

.topo{
 background:linear-gradient(135deg,#6a00ff,#8e2de2);
 padding:20px;
 display:flex;
 justify-content:space-between;
 align-items:center;
}

.container{
 padding:15px;
 display:grid;
 gap:15px;
}

.card{
 background:#1c1c25;
 padding:15px;
 border-radius:15px;
}

input,select{
 width:100%;
 padding:10px;
 margin-top:5px;
 background:#2a2a35;
 border:none;
 border-radius:8px;
 color:white;
}

button{
 width:100%;
 padding:10px;
 margin-top:5px;
 border:none;
 border-radius:8px;
 font-weight:bold;
}

.green{background:#00c853;}
.red{background:#ff1744;}

.item{border-bottom:1px solid #333;padding:5px;}
</style>
</head>

<body>

<div class="topo">
 <div>
  <div>Saldo: R$ <span id="saldoTotal">0</span></div>
 </div>
 <div id="nomeUsuario"></div>
</div>

<div class="container">

<div class="card">
 <input id="entradaValor" placeholder="Valor entrada">
 <button class="green" onclick="addEntrada()">Receber</button>

 <input id="saidaValor" placeholder="Valor saída">
 <select id="categoria">
  <option>Alimentação</option>
  <option>Gasolina</option>
  <option>Energia</option>
  <option>Água</option>
  <option>Aluguel</option>
  <option>Funcionários</option>
  <option>Internet</option>
  <option>Outros</option>
 </select>
 <button class="red" onclick="addSaida()">Gastar</button>
</div>

<div class="card">
 <canvas id="grafico"></canvas>
</div>

<div class="card">
 <div id="lista"></div>
</div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, addDoc, onSnapshot, query, where, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const app = initializeApp({
 apiKey:"AIzaSyAh0Qi4lm-ZXQLe4YAca8wYbp5kcU6lY3I",
 authDomain:"fluxozap-10ead.firebaseapp.com",
 projectId:"fluxozap-10ead"
});

const db=getFirestore(app);
const auth=getAuth(app);

let empresaId="",userId="",nivel="";
let chart;

onAuthStateChanged(auth,async user=>{
 if(!user) return location.href="index.html";

 userId=user.uid;

 let docUser=await getDoc(doc(db,"usuarios",user.uid));
 let data=docUser.data();

 empresaId=data.empresaId;
 nivel=data.nivel;

 nomeUsuario.innerText=data.nome;

 carregar();
});

function carregar(){
 let q;

 if(nivel==="admin"){
  q=query(collection(db,"movimentos"),where("empresaId","==",empresaId));
 }else{
  q=query(collection(db,"movimentos"),where("userId","==",userId));
 }

 onSnapshot(q,(snap)=>{
  let saldo=0;
  let entrada=0;
  let saida=0;

  lista.innerHTML="";

  snap.forEach(doc=>{
   let d=doc.data();
   let v=Number(d.valor)||0;

   if(d.tipo==="entrada"){
    saldo+=v; entrada+=v;
   }else{
    saldo-=v; saida+=v;
   }

   lista.innerHTML+=`<div class="item">${d.tipo} - R$ ${v}</div>`;
  });

  saldoTotal.innerText=saldo.toFixed(2);

  if(chart) chart.destroy();

  chart=new Chart(grafico,{
   type:"doughnut",
   data:{
    labels:["Entrada","Saída"],
    datasets:[{
     data:[entrada,saida],
     backgroundColor:["green","red"]
    }]
   }
  });
 });
}

window.addEntrada=async()=>{
 await addDoc(collection(db,"movimentos"),{
  tipo:"entrada",
  valor:Number(entradaValor.value),
  empresaId,
  userId,
  data:new Date().toISOString()
 });
}

window.addSaida=async()=>{
 await addDoc(collection(db,"movimentos"),{
  tipo:"saida",
  valor:Number(saidaValor.value),
  categoria:categoria.value,
  empresaId,
  userId,
  data:new Date().toISOString()
 });
}
</script>

</body>
</html>
