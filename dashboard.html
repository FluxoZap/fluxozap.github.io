<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>FluxoZap</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
  margin: 0;
  font-family: 'Inter', sans-serif;
  background: #0d0d0d;
  color: white;
}

.app {
  padding: 20px;
}

/* TOPO */
.topo {
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.logo {
  font-size: 20px;
  font-weight: 600;
}

.perfil {
  display: flex;
  align-items: center;
  gap: 10px;
}

.perfil img {
  width: 40px;
  height: 40px;
  border-radius: 50%;
}

/* SALDO */
.card {
  margin-top: 20px;
}

.saldo {
  font-size: 40px;
  font-weight: bold;
}

/* BOTÕES */
.acoes {
  display: flex;
  gap: 10px;
  margin-top: 20px;
}

.btn {
  flex: 1;
  padding: 18px;
  border-radius: 15px;
  border: none;
  font-size: 16px;
  font-weight: bold;
}

.recebi { background: #00c853; }
.gastei { background: #d50000; }

/* MODAL */
.modal {
  position: fixed;
  bottom: 0;
  width: 100%;
  background: #111;
  padding: 20px;
  display: none;
}

input {
  width: 100%;
  padding: 15px;
  margin-top: 10px;
  border-radius: 10px;
  border: none;
  background: #222;
  color: white;
}

/* EXTRATO */
.item {
  background: #1a1a1a;
  padding: 12px;
  border-radius: 10px;
  margin-top: 10px;
}

/* GRAFICO */
.grafico {
  margin-top: 30px;
}
</style>
</head>

<body>

<div class="app">

<div class="topo">
  <div class="logo">FluxoZap</div>
  <div class="perfil">
    <span id="nomeUsuario"></span>
    <img id="foto" src="https://i.pravatar.cc/100">
  </div>
</div>

<div class="card">
  <div>Saldo disponível</div>
  <div class="saldo">R$ <span id="saldo">0.00</span></div>
</div>

<div class="acoes">
  <button class="btn recebi" onclick="abrirModal('entrada')">Recebi</button>
  <button class="btn gastei" onclick="abrirModal('saida')">Gastei</button>
</div>

<div class="grafico">
  <canvas id="grafico"></canvas>
</div>

<div id="lista"></div>

</div>

<div class="modal" id="modal">
  <h3 id="titulo"></h3>
  <input type="number" id="valor" placeholder="Digite o valor">
  <button onclick="salvar()">Confirmar</button>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs, query, where } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyAh0Qi4lm-ZXQLe4YAca8wYbp5kcU6lY3I",
  authDomain: "fluxozap-10ead.firebaseapp.com",
  projectId: "fluxozap-10ead"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

let userId = "";
let tipoAtual = "";
let chart;

onAuthStateChanged(auth, async (user) => {
  if (user) {
    userId = user.uid;
    document.getElementById("nomeUsuario").innerText = user.email;
    carregar();
  } else {
    window.location.href = "index.html";
  }
});

window.abrirModal = function(tipo) {
  tipoAtual = tipo;
  document.getElementById("modal").style.display = "block";
  document.getElementById("titulo").innerText = tipo === "entrada" ? "Recebimento" : "Gasto";
}

window.salvar = async function() {
  let valor = parseFloat(document.getElementById("valor").value);
  if (!valor) return;

  await addDoc(collection(db, "movimentos"), {
    tipo: tipoAtual,
    valor,
    data: new Date().toLocaleString(),
    userId
  });

  document.getElementById("modal").style.display = "none";
  document.getElementById("valor").value = "";
  carregar();
}

async function carregar() {
  let saldo = 0;
  let entrada = 0;
  let saida = 0;

  let lista = document.getElementById("lista");
  lista.innerHTML = "";

  const q = query(collection(db, "movimentos"), where("userId", "==", userId));
  const docs = await getDocs(q);

  docs.forEach(doc => {
    let d = doc.data();

    if (d.tipo === "entrada") {
      saldo += d.valor;
      entrada += d.valor;
    } else {
      saldo -= d.valor;
      saida += d.valor;
    }

    lista.innerHTML += `
      <div class="item">
        ${d.tipo === "entrada" ? "Entrada" : "Saída"} - ${d.data}
        <br>
        <strong style="color:${d.tipo === "entrada" ? "#00e676" : "#ff5252"}">
          R$ ${d.valor.toFixed(2)}
        </strong>
      </div>
    `;
  });

  document.getElementById("saldo").innerText = saldo.toFixed(2);

  // gráfico
  const ctx = document.getElementById("grafico");

  if (chart) chart.destroy();

  chart = new Chart(ctx, {
    type: 'doughnut',
    data: {
      labels: ['Recebido', 'Gasto'],
      datasets: [{
        data: [entrada, saida],
        backgroundColor: ['#00e676', '#ff5252']
      }]
    }
  });
}
</script>

</body>
</html>
