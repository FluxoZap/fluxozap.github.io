<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>FluxoZap</title>

<link rel="manifest" href="manifest.json">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body{
  margin:0;
  font-family:Inter;
  background:#0b0c10;
  color:white;
}

.container{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:20px;
  padding:20px;
}

.bloco{
  background:#15171c;
  padding:20px;
  border-radius:15px;
}

.saldo{
  font-size:40px;
}

input,select{
  width:100%;
  padding:12px;
  margin-top:10px;
  background:#222;
  border:none;
  border-radius:10px;
  color:white;
}

button{
  width:100%;
  padding:12px;
  margin-top:10px;
  border:none;
  border-radius:10px;
}

.recebi{background:#00c853;}
.gastei{background:#ff1744;}

canvas{max-height:250px;}
</style>
</head>

<body>

<div class="container">

<div class="bloco">
Saldo Total
<div class="saldo">R$ <span id="saldo">0</span></div>
</div>

<div class="bloco" id="nome"></div>

<div class="bloco">
Receber
<input id="entradaValor">
<button class="recebi" onclick="addEntrada()">Adicionar</button>

Gastar
<input id="saidaValor">
<select id="categoria">
<option>Alimentação</option>
<option>Transporte</option>
<option>Contas</option>
</select>
<button class="gastei" onclick="addSaida()">Adicionar</button>
</div>

<div class="bloco">
Filtro
<input type="date" id="dataInicio">
<input type="date" id="dataFim">
<button onclick="filtrar()">Filtrar</button>
<button onclick="pdf()">PDF</button>
</div>

<div class="bloco">
<canvas id="grafico"></canvas>
</div>

<div class="bloco">
Extrato
<div id="lista"></div>
</div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs, query, where } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const firebaseConfig={
  apiKey:"AIzaSyAh0Qi4lm-ZXQLe4YAca8wYbp5kcU6lY3I",
  authDomain:"fluxozap-10ead.firebaseapp.com",
  projectId:"fluxozap-10ead"
};

const app=initializeApp(firebaseConfig);
const db=getFirestore(app);
const auth=getAuth(app);

let userId="",chart,dados=[];

onAuthStateChanged(auth,user=>{
 if(user){
  userId=user.uid;
  nome.innerText=user.email;
  carregar();
 }else{
  window.location.href="index.html";
 }
});

window.addEntrada=async()=>{
 let v=parseFloat(entradaValor.value);
 await addDoc(collection(db,"movimentos"),{tipo:"entrada",valor:v,data:new Date().toISOString(),userId});
 carregar();
}

window.addSaida=async()=>{
 let v=parseFloat(saidaValor.value);
 await addDoc(collection(db,"movimentos"),{tipo:"saida",valor:v,data:new Date().toISOString(),userId});
 carregar();
}

async function carregar(){
 let saldo=0,ent=0,sai=0;
 lista.innerHTML="";
 dados=[];

 const q=query(collection(db,"movimentos"),where("userId","==",userId));
 const docs=await getDocs(q);

 docs.forEach(doc=>{
  let d=doc.data();
  dados.push(d);

  if(d.tipo=="entrada"){saldo+=d.valor;ent+=d.valor;}
  else{sai+=d.valor;saldo-=d.valor;}

  lista.innerHTML+=`<div>${d.tipo} R$ ${d.valor}</div>`;
 });

 saldoEl.innerText=saldo;

 if(chart)chart.destroy();

 chart=new Chart(grafico,{
  type:"doughnut",
  data:{
   labels:["Entrada","Saída"],
   datasets:[{data:[ent,sai],backgroundColor:["#00c853","#ff1744"]}]
  }
 });
}

window.filtrar=()=>{
 lista.innerHTML="";
 let i=new Date(dataInicio.value);
 let f=new Date(dataFim.value);

 dados.forEach(d=>{
  let dt=new Date(d.data);
  if(dt>=i && dt<=f){
   lista.innerHTML+=`<div>${d.tipo} R$ ${d.valor}</div>`;
  }
 });
}

window.pdf=()=>{
 const { jsPDF } = window.jspdf;
 let doc=new jsPDF();
 let y=10;

 dados.forEach(d=>{
  doc.text(`${d.tipo} R$ ${d.valor}`,10,y);
  y+=10;
 });

 doc.save("extrato.pdf");
}
</script>

<script>
if("serviceWorker" in navigator){
 navigator.serviceWorker.register("sw.js");
}
</script>

</body>
</html>
