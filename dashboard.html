<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>FluxoZap</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body{
 margin:0;
 font-family:Arial;
 background:#0b0c10;
 color:white;
}

.topo{
 background:linear-gradient(135deg,#6a00ff,#8e2de2);
 padding:20px;
 display:flex;
 justify-content:space-between;
 align-items:center;
}

.user{
 display:flex;
 align-items:center;
 gap:10px;
}

.user img{
 width:50px;
 height:50px;
 border-radius:50%;
}

.saldo{
 font-size:26px;
 font-weight:bold;
}

.container{
 padding:15px;
 display:grid;
 gap:15px;
}

.card{
 background:#15171c;
 padding:15px;
 border-radius:15px;
}

input,select{
 width:100%;
 padding:12px;
 margin-top:8px;
 background:#222;
 border:none;
 border-radius:10px;
 color:white;
}

button{
 width:100%;
 padding:12px;
 margin-top:10px;
 border:none;
 border-radius:10px;
 font-weight:bold;
}

.green{background:#00c853;}
.red{background:#ff1744;}
.gray{background:#333;}

canvas{
 height:120px !important;
}

.item{
 border-bottom:1px solid #333;
 padding:6px 0;
}
</style>
</head>

<body>

<div class="topo">
 <div>
  <div id="nomeUsuario">Carregando...</div>
  <div class="saldo">R$ <span id="saldoTotal">0</span></div>
  <div>Hoje: R$ <span id="saldoDia">0</span></div>
  <div>Mês: R$ <span id="saldoMes">0</span></div>
 </div>

 <div class="user">
  <input type="file" id="fotoInput">
  <img id="fotoPerfil">
 </div>
</div>

<div class="container">

<div class="card">
 <h3>Receber</h3>
 <input id="entradaValor" type="number">
 <button class="green" onclick="addEntrada()">Adicionar</button>

 <h3>Gastar</h3>
 <input id="saidaValor" type="number">
 <button class="red" onclick="addSaida()">Adicionar</button>
</div>

<div class="card">
 <h3>Resumo</h3>
 <canvas id="grafico"></canvas>
</div>

<div class="card">
 <h3>Meta mensal</h3>
 <input id="metaValor">
 <button onclick="salvarMeta()">Salvar</button>
 <p>Usado: R$ <span id="usado">0</span></p>
 <p>Restante: R$ <span id="restante">0</span></p>
</div>

<div class="card">
 <h3>Filtro</h3>
 <input type="date" id="dataInicio">
 <input type="date" id="dataFim">
 <button class="gray" onclick="filtrar()">Filtrar</button>
 <button class="gray" onclick="gerarPDF()">Gerar PDF</button>
</div>

<div class="card">
 <h3>Extrato</h3>
 <div id="lista"></div>
</div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, addDoc, onSnapshot, query, where, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-storage.js";

const app = initializeApp({
 apiKey:"AIzaSyAh0Qi4lm-ZXQLe4YAca8wYbp5kcU6lY3I",
 authDomain:"fluxozap-10ead.firebaseapp.com",
 projectId:"fluxozap-10ead"
});

const db = getFirestore(app);
const auth = getAuth(app);
const storage = getStorage(app);

let empresaId="";
let dados=[];
let chart;

onAuthStateChanged(auth, async user=>{
 if(!user) return location.href="index.html";

 const userDoc = await getDoc(doc(db,"usuarios",user.uid));
 const userData = userDoc.data();

 empresaId = userData.empresaId;
 nomeUsuario.innerText = userData.email;

 if(userData.foto){
  fotoPerfil.src = userData.foto;
 }

 iniciar();
});

function iniciar(){
 const q = query(collection(db,"movimentos"),where("empresaId","==",empresaId));

 onSnapshot(q,(snapshot)=>{

  let saldo=0,entrada=0,saida=0;
  let saldoDia=0,saldoMes=0;

  dados=[];
  lista.innerHTML="";

  let hoje=new Date().toDateString();
  let mes=new Date().getMonth();

  snapshot.forEach(doc=>{
   let d=doc.data();
   let valor = Number(d.valor)||0;
   let tipo = (d.tipo||"").toLowerCase();
   let data = new Date(d.data);

   dados.push(d);

   if(tipo==="entrada"){
    saldo += valor;
    entrada += valor;
   }else if(tipo==="saída" || tipo==="saida"){
    saldo -= valor;
    saida += valor;
   }

   if(data.toDateString()===hoje){
    saldoDia += tipo==="entrada"?valor:-valor;
   }

   if(data.getMonth()===mes){
    saldoMes += tipo==="entrada"?valor:-valor;
   }

   lista.innerHTML += `
   <div class="item">
    ${tipo.toUpperCase()} - R$ ${valor}
   </div>`;
  });

  saldoTotal.innerText = saldo.toFixed(2);
  saldoDia.innerText = saldoDia.toFixed(2);
  saldoMes.innerText = saldoMes.toFixed(2);

  atualizarGrafico(entrada,saida);
  atualizarMeta(saida);
 });
}

window.addEntrada = async()=>{
 let v = Number(entradaValor.value);
 if(!v) return;

 await addDoc(collection(db,"movimentos"),{
  tipo:"entrada",
  valor:v,
  data:new Date().toISOString(),
  empresaId
 });

 entradaValor.value="";
}

window.addSaida = async()=>{
 let v = Number(saidaValor.value);
 if(!v) return;

 await addDoc(collection(db,"movimentos"),{
  tipo:"saida",
  valor:v,
  data:new Date().toISOString(),
  empresaId
 });

 saidaValor.value="";
}

function atualizarGrafico(ent,sai){
 if(chart) chart.destroy();

 chart = new Chart(grafico,{
  type:"doughnut",
  data:{
   labels:["Entrada","Saída"],
   datasets:[{
    data:[ent,sai],
    backgroundColor:["#00c853","#ff1744"]
   }]
  }
 });
}

window.salvarMeta=()=>{
 localStorage.setItem("meta",metaValor.value);
}

function atualizarMeta(gasto){
 let meta = Number(localStorage.getItem("meta"))||0;

 usado.innerText = gasto;
 restante.innerText = meta - gasto;

 if(meta>0 && gasto >= meta*0.75){
  alert("⚠️ Você já gastou 75% da meta");
 }
}

window.filtrar=()=>{
 lista.innerHTML="";

 let i=new Date(dataInicio.value);
 let f=new Date(dataFim.value);

 dados.forEach(d=>{
  let dt=new Date(d.data);

  if(dt>=i && dt<=f){
   lista.innerHTML += `<div>${d.tipo} - R$ ${d.valor}</div>`;
  }
 });
}

window.gerarPDF=()=>{
 const { jsPDF } = window.jspdf;
 let doc=new jsPDF();
 let y=10;

 dados.forEach(d=>{
  doc.text(`${d.tipo} - R$ ${d.valor}`,10,y);
  y+=10;
 });

 doc.save("extrato.pdf");
}

fotoInput.onchange=async()=>{
 let file=fotoInput.files[0];
 let r=ref(storage,"foto"+auth.currentUser.uid);

 await uploadBytes(r,file);
 let url=await getDownloadURL(r);

 await setDoc(doc(db,"usuarios",auth.currentUser.uid),{
  foto:url
 },{merge:true});

 fotoPerfil.src=url;
}
</script>

</body>
</html>
