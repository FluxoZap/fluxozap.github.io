<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>FluxoZap</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
 margin:0;
 font-family:Arial;
 background:#0f0f14;
 color:white;
}

.topo{
 background:linear-gradient(135deg,#6a00ff,#8e2de2);
 padding:20px;
 display:flex;
 justify-content:space-between;
 align-items:center;
}

.logo{
 font-size:18px;
 font-weight:bold;
 margin-bottom:5px;
}

.user{
 display:flex;
 flex-direction:column;
 align-items:center;
}

.foto-box{
 position:relative;
 width:60px;
 height:60px;
}

.foto-box img{
 width:60px;
 height:60px;
 border-radius:50%;
 object-fit:cover;
}

.foto-box label{
 position:absolute;
 bottom:0;
 right:0;
 background:#00c853;
 width:20px;
 height:20px;
 border-radius:50%;
 display:flex;
 justify-content:center;
 align-items:center;
 cursor:pointer;
}

.foto-box input{display:none;}

.container{
 padding:15px;
 display:grid;
 gap:15px;
}

.card{
 background:#1c1c25;
 padding:15px;
 border-radius:15px;
}

input,select{
 width:100%;
 padding:12px;
 margin-top:8px;
 background:#2a2a35;
 border:none;
 border-radius:10px;
 color:white;
}

button{
 width:100%;
 padding:12px;
 margin-top:10px;
 border:none;
 border-radius:10px;
 font-weight:bold;
}

.green{background:#00c853;}
.red{background:#ff1744;}

canvas{
 height:140px !important;
}
</style>
</head>

<body>

<div class="topo">
 <div>
  <div class="logo">FluxoZap 💳</div>
  <div>Saldo: R$ <span id="saldoTotal">0</span></div>
  <div>Hoje: R$ <span id="saldoDia">0</span></div>
  <div>Mês: R$ <span id="saldoMes">0</span></div>
 </div>

 <div class="user">
  <div class="foto-box">
    <img id="fotoPerfil">
    <label for="fotoInput">+</label>
    <input type="file" id="fotoInput">
  </div>
  <div id="nomeUsuario"></div>
 </div>
</div>

<div class="container">

<div class="card">
 <h3>Movimentação</h3>

 <input id="entradaValor" placeholder="Valor recebido">
 <button class="green" onclick="addEntrada()">Receber</button>

 <input id="saidaValor" placeholder="Valor gasto">
 <select id="categoria">
  <option>Alimentação</option>
  <option>Gasolina</option>
  <option>Energia</option>
  <option>Água</option>
  <option>Aluguel</option>
  <option>Funcionários</option>
  <option>Internet</option>
  <option>Telefone</option>
  <option>Cartão</option>
  <option>Impostos</option>
  <option>Outros</option>
 </select>
 <button class="red" onclick="addSaida()">Gastar</button>
</div>

<div class="card">
 <canvas id="grafico"></canvas>
 <div id="resumoBanco"></div>
</div>

<div class="card">
 <h3>Extrato</h3>
 <div id="lista"></div>
</div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, addDoc, onSnapshot, query, where, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const app = initializeApp({
 apiKey:"AIzaSyAh0Qi4lm-ZXQLe4YAca8wYbp5kcU6lY3I",
 authDomain:"fluxozap-10ead.firebaseapp.com",
 projectId:"fluxozap-10ead"
});

const db=getFirestore(app);
const auth=getAuth(app);

let empresaId="",userId="",nivel="";
let chart;

onAuthStateChanged(auth, async user=>{
 if(!user) return location.href="index.html";

 userId=user.uid;

 let docUser=await getDoc(doc(db,"usuarios",user.uid));
 let data=docUser.data()||{};

 empresaId=data.empresaId||user.uid;
 nivel=data.nivel||"admin";

 nomeUsuario.innerText=data.nome||"Usuário";

 if(data.foto) fotoPerfil.src=data.foto;

 carregar();
});

function carregar(){
 let q = query(collection(db,"movimentos"),where("empresaId","==",empresaId));

 onSnapshot(q,(snap)=>{
  let saldo=0,entrada=0,saida=0;
  let saldoDia=0,saldoMes=0;
  let categorias={};

  lista.innerHTML="";

  let hoje=new Date().toDateString();
  let mes=new Date().getMonth();

  snap.forEach(doc=>{
   let d=doc.data();
   let v=Number(d.valor)||0;
   let dt=new Date(d.data);

   if(d.tipo==="entrada"){
    saldo+=v; entrada+=v;
   }else{
    saldo-=v; saida+=v;
    let cat=d.categoria||"Outros";
    categorias[cat]=(categorias[cat]||0)+v;
   }

   if(dt.toDateString()===hoje){
    saldoDia += d.tipo==="entrada"?v:-v;
   }

   if(dt.getMonth()===mes){
    saldoMes += d.tipo==="entrada"?v:-v;
   }

   lista.innerHTML+=`<div>${d.tipo} - R$ ${v} (${d.categoria||""})</div>`;
  });

  saldoTotal.innerText=saldo.toFixed(2);
  saldoDia.innerText=saldoDia.toFixed(2);
  saldoMes.innerText=saldoMes.toFixed(2);

  // 🔥 RESUMO TIPO BANCO
  resumoBanco.innerHTML = `
   Entrada: R$ ${entrada.toFixed(2)} <br>
   Saída: R$ ${saida.toFixed(2)} <br>
   Resultado: R$ ${(entrada-saida).toFixed(2)}
  `;

  // 🔥 GRÁFICO POR CATEGORIA
  if(chart) chart.destroy();

  chart=new Chart(grafico,{
   type:"doughnut",
   data:{
    labels:Object.keys(categorias),
    datasets:[{
     data:Object.values(categorias)
    }]
   }
  });
 });
}

window.addEntrada=async()=>{
 await addDoc(collection(db,"movimentos"),{
  tipo:"entrada",
  valor:Number(entradaValor.value),
  empresaId,
  userId,
  data:new Date().toISOString()
 });
}

window.addSaida=async()=>{
 await addDoc(collection(db,"movimentos"),{
  tipo:"saida",
  valor:Number(saidaValor.value),
  categoria:categoria.value,
  empresaId,
  userId,
  data:new Date().toISOString()
 });
}

fotoInput.onchange=async()=>{
 let file=fotoInput.files[0];
 const reader=new FileReader();

 reader.onload=async e=>{
  let base64=e.target.result;

  await setDoc(doc(db,"usuarios",auth.currentUser.uid),{
   foto:base64
  },{merge:true});

  fotoPerfil.src=base64;
 }

 reader.readAsDataURL(file);
}
</script>

</body>
</html>
