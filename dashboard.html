<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>FluxoZap</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
  margin:0;
  font-family:'Inter',sans-serif;
  background:#0a0a0a;
  color:white;
}

.app{
  max-width:500px;
  margin:auto;
  padding:15px;
}

/* BLOCO */
.bloco{
  background:#141414;
  border-radius:15px;
  padding:15px;
  margin-bottom:15px;
}

/* SALDO */
.saldo{
  font-size:36px;
  font-weight:bold;
}

/* PERFIL */
.perfil{
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.perfil img{
  width:40px;
  border-radius:50%;
}

/* INPUTS */
.input-area{
  display:flex;
  gap:10px;
  margin-top:10px;
}

input{
  flex:1;
  padding:12px;
  border-radius:10px;
  border:none;
  background:#222;
  color:white;
}

button{
  padding:12px;
  border:none;
  border-radius:10px;
  font-weight:bold;
}

.recebi{background:#00c853;}
.gastei{background:#d50000;}

/* GRAFICO */
canvas{
  max-height:180px;
}

/* EXTRATO */
.item{
  margin-top:8px;
  font-size:14px;
}
</style>
</head>

<body>

<div class="app">

<!-- 1 SALDO -->
<div class="bloco">
  <div>Saldo Total</div>
  <div class="saldo">R$ <span id="saldo">0.00</span></div>
</div>

<!-- 2 CONTA -->
<div class="bloco perfil">
  <div>
    <div id="nomeUsuario">Usuário</div>
    <small>Conta</small>
  </div>
  <img id="foto" src="https://i.pravatar.cc/100">
</div>

<!-- 3 RECEBI / GASTEI -->
<div class="bloco">

  <div>Recebimento</div>
  <div class="input-area">
    <input id="entradaValor" type="number" placeholder="Valor recebido">
    <button class="recebi" onclick="addEntrada()">+</button>
  </div>

  <div style="margin-top:15px;">Gasto</div>
  <div class="input-area">
    <input id="saidaValor" type="number" placeholder="Valor gasto">
    <button class="gastei" onclick="addSaida()">-</button>
  </div>

</div>

<!-- 4 GRAFICO + EXTRATO -->
<div class="bloco">

  <canvas id="grafico"></canvas>
  <div id="percentual"></div>

  <hr style="margin:15px 0; border-color:#333;">

  <div id="lista"></div>

</div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs, query, where } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyAh0Qi4lm-ZXQLe4YAca8wYbp5kcU6lY3I",
  authDomain: "fluxozap-10ead.firebaseapp.com",
  projectId: "fluxozap-10ead"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

let userId="";
let chart;

onAuthStateChanged(auth,(user)=>{
  if(user){
    userId=user.uid;
    document.getElementById("nomeUsuario").innerText=user.email;
    carregar();
  }else{
    window.location.href="index.html";
  }
});

window.addEntrada = async function(){
  let valor=parseFloat(document.getElementById("entradaValor").value);
  if(!valor) return;

  await addDoc(collection(db,"movimentos"),{
    tipo:"entrada",
    valor,
    data:new Date().toLocaleString(),
    userId
  });

  document.getElementById("entradaValor").value="";
  carregar();
}

window.addSaida = async function(){
  let valor=parseFloat(document.getElementById("saidaValor").value);
  if(!valor) return;

  await addDoc(collection(db,"movimentos"),{
    tipo:"saida",
    valor,
    data:new Date().toLocaleString(),
    userId
  });

  document.getElementById("saidaValor").value="";
  carregar();
}

async function carregar(){
  let saldo=0,entrada=0,saida=0;

  let lista=document.getElementById("lista");
  lista.innerHTML="";

  const q=query(collection(db,"movimentos"),where("userId","==",userId));
  const docs=await getDocs(q);

  docs.forEach(doc=>{
    let d=doc.data();

    if(d.tipo==="entrada"){saldo+=d.valor;entrada+=d.valor;}
    else{saldo-=d.valor;saida+=d.valor;}

    lista.innerHTML+=`
      <div class="item">
        ${d.tipo==="entrada"?"Entrada":"Saída"} - ${d.data}
        <br>
        <strong style="color:${d.tipo==="entrada"?"#00e676":"#ff5252"}">
        R$ ${d.valor.toFixed(2)}
        </strong>
      </div>
    `;
  });

  document.getElementById("saldo").innerText=saldo.toFixed(2);

  let total=entrada+saida;
  let perc=total?((entrada/total)*100).toFixed(1):0;
  document.getElementById("percentual").innerText="Positivo: "+perc+"%";

  const ctx=document.getElementById("grafico");
  if(chart) chart.destroy();

  chart=new Chart(ctx,{
    type:'doughnut',
    data:{
      labels:['Recebido','Gasto'],
      datasets:[{
        data:[entrada,saida],
        backgroundColor:['#00e676','#ff5252']
      }]
    }
  });
}
</script>

</body>
</html>
