<!DOCTYPE html>
<html>
<head>
  <title>FluxoZap</title>
  <style>
    body {
      font-family: Arial;
      background: #0f172a;
      color: white;
      text-align: center;
    }

    .box {
      background: #1e293b;
      padding: 15px;
      margin: 10px;
      border-radius: 10px;
    }

    input, button {
      padding: 10px;
      margin: 5px;
      border-radius: 5px;
      border: none;
    }

    .entrada { background: green; color: white; }
    .saida { background: red; color: white; }
  </style>
</head>
<body>

<h2>FluxoZap 💰</h2>

<div class="box">
  <h3>Saldo: R$ <span id="saldo">0.00</span></h3>
</div>

<div class="box">
  <input id="desc" placeholder="Descrição">
  <input id="valor" type="number" step="0.01" placeholder="Valor">

  <br>
  <button class="entrada" onclick="entrada()">Recebi</button>
  <button class="saida" onclick="saida()">Gastei</button>
</div>

<div class="box">
  <h4>Movimentações</h4>
  <div id="lista"></div>
</div>

<script type="module">
import { db, auth } from "./firebase.js";
import { collection, addDoc, getDocs } 
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

let saldo = 0;

window.entrada = async function() {
  let desc = document.getElementById("desc").value;
  let valor = parseFloat(document.getElementById("valor").value);

  if (!valor) return alert("Digite um valor");

  await addDoc(collection(db, "movimentos"), {
    tipo: "entrada",
    desc,
    valor
  });

  carregar();
}

window.saida = async function() {
  let desc = document.getElementById("desc").value;
  let valor = parseFloat(document.getElementById("valor").value);

  if (!valor) return alert("Digite um valor");

  await addDoc(collection(db, "movimentos"), {
    tipo: "saida",
    desc,
    valor
  });

  carregar();
}

async function carregar() {
  saldo = 0;
  let lista = document.getElementById("lista");
  lista.innerHTML = "";

  const querySnapshot = await getDocs(collection(db, "movimentos"));

  querySnapshot.forEach(doc => {
    let d = doc.data();

    if (d.tipo === "entrada") saldo += d.valor;
    else saldo -= d.valor;

    lista.innerHTML += `
      <p>${d.tipo} - ${d.desc} - R$ ${d.valor.toFixed(2)}</p>
    `;
  });

  document.getElementById("saldo").innerText = saldo.toFixed(2);
}

carregar();
</script>

</body>
</html>
