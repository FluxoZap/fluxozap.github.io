<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>FluxoZap</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body{
 margin:0;
 font-family:Arial;
 background:#0f0f14;
 color:white;
}

.topo{
 background:linear-gradient(135deg,#6a00ff,#8e2de2);
 padding:20px;
 display:flex;
 justify-content:space-between;
 align-items:center;
}

.user{
 display:flex;
 align-items:center;
 gap:10px;
}

.user img{
 width:45px;
 height:45px;
 border-radius:50%;
}

.saldo{
 font-size:26px;
 font-weight:bold;
}

.container{
 padding:15px;
 display:grid;
 gap:15px;
}

.card{
 background:#1c1c25;
 padding:15px;
 border-radius:15px;
}

input,select{
 width:100%;
 padding:12px;
 margin-top:8px;
 background:#2a2a35;
 border:none;
 border-radius:10px;
 color:white;
}

button{
 width:100%;
 padding:12px;
 margin-top:10px;
 border:none;
 border-radius:10px;
 font-weight:bold;
}

.green{background:#00c853;}
.red{background:#ff1744;}
.gray{background:#333;}

canvas{
 height:120px !important;
}

.item{
 border-bottom:1px solid #333;
 padding:6px 0;
}
</style>
</head>

<body>

<div class="topo">
 <div>
  <div id="nomeUsuario"></div>
  <div class="saldo">R$ <span id="saldoTotal">0</span></div>
  <div>Hoje: R$ <span id="saldoDia">0</span></div>
 </div>

 <div class="user">
  <input type="file" id="fotoInput">
  <img id="fotoPerfil">
 </div>
</div>

<div class="container">

<div class="card">
 <h3>Receber</h3>
 <input id="entradaValor">
 <button class="green" onclick="addEntrada()">Adicionar</button>

 <h3>Gastar</h3>
 <input id="saidaValor">
 <select id="categoria">
  <option>Alimentação</option>
  <option>Gasolina</option>
  <option>Contas</option>
  <option>Outros</option>
 </select>
 <button class="red" onclick="addSaida()">Adicionar</button>
</div>

<div class="card">
 <canvas id="grafico"></canvas>
</div>

<div class="card">
 <h3>Filtro</h3>
 <input type="date" id="dataInicio">
 <input type="date" id="dataFim">
 <button onclick="filtrar()">Filtrar</button>
 <button onclick="gerarPDF()">Gerar PDF</button>
</div>

<div class="card">
 <h3>Extrato</h3>
 <div id="lista"></div>
</div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, addDoc, onSnapshot, query, where, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-storage.js";

const app=initializeApp({
 apiKey:"AIzaSyAh0Qi4lm-ZXQLe4YAca8wYbp5kcU6lY3I",
 authDomain:"fluxozap-10ead.firebaseapp.com",
 projectId:"fluxozap-10ead"
});

const db=getFirestore(app);
const auth=getAuth(app);
const storage=getStorage(app);

let empresaId="";
let dados=[];
let chart;

onAuthStateChanged(auth,async user=>{
 if(!user) return location.href="index.html";

 let docUser=await getDoc(doc(db,"usuarios",user.uid));
 let data=docUser.data();

 empresaId=data.empresaId;

 nomeUsuario.innerText=data.nome;

 if(data.foto) fotoPerfil.src=data.foto;

 carregar();
});

function carregar(){
 const q=query(collection(db,"movimentos"),where("empresaId","==",empresaId));

 onSnapshot(q,(snap)=>{
  let saldo=0,entrada=0,saida=0,saldoDia=0;

  lista.innerHTML="";
  dados=[];

  let hoje=new Date().toDateString();

  snap.forEach(doc=>{
   let d=doc.data();
   let v=Number(d.valor)||0;
   let tipo=(d.tipo||"").toLowerCase();
   let data=new Date(d.data);

   dados.push(d);

   if(tipo==="entrada"){saldo+=v;entrada+=v;}
   else{saldo-=v;saida+=v;}

   if(data.toDateString()===hoje){
    saldoDia += tipo==="entrada"?v:-v;
   }

   lista.innerHTML+=`<div>${tipo} - R$ ${v}</div>`;
  });

  saldoTotal.innerText=saldo.toFixed(2);
  saldoDia.innerText=saldoDia.toFixed(2);

  if(chart) chart.destroy();

  chart=new Chart(grafico,{
   type:"doughnut",
   data:{
    labels:["Entrada","Saída"],
    datasets:[{
     data:[entrada,saida],
     backgroundColor:["#00c853","#ff1744"]
    }]
   }
  });
 });
}

window.addEntrada=async()=>{
 await addDoc(collection(db,"movimentos"),{
  tipo:"entrada",
  valor:Number(entradaValor.value),
  data:new Date().toISOString(),
  empresaId
 });
}

window.addSaida=async()=>{
 await addDoc(collection(db,"movimentos"),{
  tipo:"saida",
  valor:Number(saidaValor.value),
  categoria:categoria.value,
  data:new Date().toISOString(),
  empresaId
 });
}

window.filtrar=()=>{
 lista.innerHTML="";
 let i=new Date(dataInicio.value);
 let f=new Date(dataFim.value);

 dados.forEach(d=>{
  let dt=new Date(d.data);
  if(dt>=i && dt<=f){
   lista.innerHTML+=`<div>${d.tipo} - R$ ${d.valor}</div>`;
  }
 });
}

window.gerarPDF=()=>{
 const { jsPDF } = window.jspdf;
 let doc=new jsPDF();
 let y=10;

 dados.forEach(d=>{
  doc.text(`${d.tipo} - R$ ${d.valor}`,10,y);
  y+=10;
 });

 doc.save("extrato.pdf");
}

fotoInput.onchange=async()=>{
 let file=fotoInput.files[0];
 let r=ref(storage,"foto"+auth.currentUser.uid);

 await uploadBytes(r,file);
 let url=await getDownloadURL(r);

 await setDoc(doc(db,"usuarios",auth.currentUser.uid),{
  foto:url
 },{merge:true});

 fotoPerfil.src=url;
}
</script>

</body>
</html>
