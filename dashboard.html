<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>FluxoZap</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
  margin:0;
  font-family:'Inter',sans-serif;
  background:#0f1115;
  color:white;
}

.container{display:flex;height:100vh;}

.sidebar{
  width:220px;
  background:#15171c;
  padding:20px;
}

.main{
  flex:1;
  padding:20px;
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:20px;
}

.bloco{
  background:#1a1d23;
  padding:20px;
  border-radius:15px;
}

.saldo{font-size:36px;font-weight:bold;}

input,select{
  width:100%;
  padding:12px;
  border-radius:10px;
  border:none;
  background:#2a2d35;
  color:white;
  margin-top:10px;
}

button{
  padding:12px;
  border:none;
  border-radius:10px;
  margin-top:10px;
  font-weight:bold;
  cursor:pointer;
}

.recebi{background:#00c853;}
.gastei{background:#d50000;}

@media(max-width:900px){
  .container{flex-direction:column;}
  .sidebar{width:100%;display:flex;justify-content:space-around;}
  .main{grid-template-columns:1fr;}
}
</style>
</head>

<body>

<div class="container">

<div class="sidebar">
  <h2>FluxoZap</h2>
  <div>Dashboard</div>
</div>

<div class="main">

<div class="bloco">
  <div>Saldo Total</div>
  <div class="saldo">R$ <span id="saldo">0</span></div>
</div>

<div class="bloco">
  <h3>Orçamento</h3>
  <input id="orcamentoInput" type="number" placeholder="Orçamento mensal">
  <button onclick="salvarOrcamento()" class="recebi">Salvar</button>

  <div>Usado: R$ <span id="usado">0</span></div>
  <div>Restante: R$ <span id="restante">0</span></div>

  <div style="background:#333;height:10px;border-radius:10px;">
    <div id="barra" style="height:10px;background:#00c853;width:0%;"></div>
  </div>

  <small id="alertaOrcamento"></small>
</div>

<div class="bloco">
  <h3>Movimentação</h3>

  <input id="entradaValor" type="number" placeholder="Recebido">
  <button class="recebi" onclick="addEntrada()">Receber</button>

  <input id="saidaValor" type="number" placeholder="Gasto">
  <select id="categoria">
    <option>Alimentação</option>
    <option>Transporte</option>
    <option>Contas</option>
    <option>Lazer</option>
    <option>Outros</option>
  </select>
  <button class="gastei" onclick="addSaida()">Gastar</button>
</div>

<div class="bloco">
  <canvas id="grafico"></canvas>
  <canvas id="graficoCategoria"></canvas>
</div>

<div class="bloco">
  <h3>Extrato</h3>
  <div id="lista"></div>
</div>

</div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs, query, where } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const firebaseConfig={
  apiKey:"AIzaSyAh0Qi4lm-ZXQLe4YAca8wYbp5kcU6lY3I",
  authDomain:"fluxozap-10ead.firebaseapp.com",
  projectId:"fluxozap-10ead"
};

const app=initializeApp(firebaseConfig);
const db=getFirestore(app);
const auth=getAuth(app);

let userId="";
let chart1,chart2;
let orcamento=0;

onAuthStateChanged(auth,user=>{
  if(user){
    userId=user.uid;
    carregar();
  }else{
    window.location.href="index.html";
  }
});

window.salvarOrcamento=async()=>{
  let v=parseFloat(document.getElementById("orcamentoInput").value);
  if(!v)return;

  await addDoc(collection(db,"configuracao"),{
    userId,orcamentoMensal:v
  });

  carregar();
}

window.addEntrada=async()=>{
  let v=parseFloat(document.getElementById("entradaValor").value);
  if(!v)return;

  await addDoc(collection(db,"movimentos"),{
    tipo:"entrada",valor:v,data:new Date().toISOString(),userId
  });

  carregar();
}

window.addSaida=async()=>{
  let v=parseFloat(document.getElementById("saidaValor").value);
  let cat=document.getElementById("categoria").value;

  if(!v)return;

  await addDoc(collection(db,"movimentos"),{
    tipo:"saida",valor:v,categoria:cat,data:new Date().toISOString(),userId
  });

  carregar();
}

async function carregar(){

  let saldo=0,entrada=0,saida=0;
  let categorias={};

  let lista=document.getElementById("lista");
  lista.innerHTML="";

  const q=query(collection(db,"movimentos"),where("userId","==",userId));
  const docs=await getDocs(q);

  docs.forEach(doc=>{
    let d=doc.data();

    if(d.tipo==="entrada"){saldo+=d.valor;entrada+=d.valor;}
    else{
      saldo-=d.valor;saida+=d.valor;

      if(!categorias[d.categoria]) categorias[d.categoria]=0;
      categorias[d.categoria]+=d.valor;
    }

    lista.innerHTML+=`
      <div>
        ${d.tipo==="entrada"?"Entrada":"Saída"} - ${d.categoria||""}
        <br>R$ ${d.valor}
      </div>
    `;
  });

  document.getElementById("saldo").innerText=saldo;

  // ORÇAMENTO
  const q2=query(collection(db,"configuracao"),where("userId","==",userId));
  const snap=await getDocs(q2);

  snap.forEach(doc=>orcamento=doc.data().orcamentoMensal);

  let restante=orcamento-saida;
  let perc=orcamento? (saida/orcamento)*100:0;

  document.getElementById("usado").innerText=saida;
  document.getElementById("restante").innerText=restante;
  document.getElementById("barra").style.width=perc+"%";

  let alerta=document.getElementById("alertaOrcamento");

  if(perc>=100) alerta.innerText="Estourou orçamento!";
  else if(perc>=75) alerta.innerText="75% usado";
  else alerta.innerText="";

  // GRAFICO 1
  if(chart1) chart1.destroy();
  chart1=new Chart(document.getElementById("grafico"),{
    type:"doughnut",
    data:{labels:["Recebido","Gasto"],datasets:[{data:[entrada,saida]}]}
  });

  // GRAFICO 2
  if(chart2) chart2.destroy();
  chart2=new Chart(document.getElementById("graficoCategoria"),{
    type:"doughnut",
    data:{
      labels:Object.keys(categorias),
      datasets:[{data:Object.values(categorias)}]
    }
  });
}
</script>

</body>
</html>
