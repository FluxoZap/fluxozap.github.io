<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>FluxoZap</title>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      font-family: 'Inter', sans-serif;
      background: #0b0b0b;
      color: white;
    }

    .app {
      max-width: 420px;
      margin: auto;
      padding: 20px;
    }

    .topo {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 25px;
    }

    .saudacao {
      font-size: 14px;
      color: #aaa;
    }

    .nome {
      font-size: 20px;
      font-weight: 600;
    }

    .perfil {
      width: 42px;
      height: 42px;
      background: #1f1f1f;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
    }

    .card {
      background: linear-gradient(135deg, #7b1fa2, #4a148c);
      border-radius: 22px;
      padding: 22px;
      margin-bottom: 25px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.5);
    }

    .saldo-label {
      font-size: 13px;
      opacity: 0.8;
    }

    .saldo {
      font-size: 34px;
      font-weight: 600;
      margin-top: 5px;
    }

    .acoes {
      display: flex;
      justify-content: space-between;
      margin-bottom: 30px;
    }

    .acao {
      flex: 1;
      margin: 0 5px;
      background: #181818;
      border-radius: 18px;
      padding: 15px;
      text-align: center;
      cursor: pointer;
      transition: 0.2s;
    }

    .acao:hover {
      background: #242424;
    }

    .icone {
      font-size: 20px;
    }

    .acao span {
      display: block;
      margin-top: 6px;
      font-size: 13px;
    }

    .extrato-titulo {
      font-size: 15px;
      margin-bottom: 10px;
      color: #aaa;
    }

    .item {
      background: #151515;
      padding: 14px;
      border-radius: 14px;
      margin-bottom: 10px;
      display: flex;
      justify-content: space-between;
      font-size: 14px;
    }

    .entrada { color: #00e676; }
    .saida { color: #ff5252; }
  </style>
</head>

<body>

<div class="app">

  <div class="topo">
    <div>
      <div class="saudacao">Olá</div>
      <div class="nome">Seu saldo</div>
    </div>
    <div class="perfil">👤</div>
  </div>

  <div class="card">
    <div class="saldo-label">Saldo disponível</div>
    <div class="saldo">R$ <span id="saldo">0.00</span></div>
  </div>

  <div class="acoes">
    <div class="acao" onclick="entrada()">
      <div class="icone">＋</div>
      <span>Recebi</span>
    </div>

    <div class="acao" onclick="saida()">
      <div class="icone">－</div>
      <span>Gastei</span>
    </div>
  </div>

  <div class="extrato-titulo">Movimentações</div>
  <div id="lista"></div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs, query, where } 
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
import { getAuth, onAuthStateChanged } 
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyAh0Qi4lm-ZXQLe4YAca8wYbp5kcU6lY3I",
  authDomain: "fluxozap-10ead.firebaseapp.com",
  projectId: "fluxozap-10ead",
  storageBucket: "fluxozap-10ead.firebasestorage.app",
  messagingSenderId: "743375450552",
  appId: "1:743375450552:web:48b85313fbc7fc30b29f4d"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

let saldo = 0;
let userId = null;

onAuthStateChanged(auth, (user) => {
  if (user) {
    userId = user.uid;
    carregar();
  } else {
    window.location.href = "index.html";
  }
});

window.entrada = async function() {
  let valor = parseFloat(prompt("Valor recebido:"));
  if (!valor) return;

  await addDoc(collection(db, "movimentos"), {
    tipo: "entrada",
    valor,
    userId
  });

  carregar();
}

window.saida = async function() {
  let valor = parseFloat(prompt("Valor gasto:"));
  if (!valor) return;

  await addDoc(collection(db, "movimentos"), {
    tipo: "saida",
    valor,
    userId
  });

  carregar();
}

async function carregar() {
  saldo = 0;
  let lista = document.getElementById("lista");
  lista.innerHTML = "";

  const q = query(collection(db, "movimentos"), where("userId", "==", userId));
  const querySnapshot = await getDocs(q);

  querySnapshot.forEach(doc => {
    let d = doc.data();

    if (d.tipo === "entrada") saldo += d.valor;
    else saldo -= d.valor;

    lista.innerHTML += `
      <div class="item">
        <span>${d.tipo === "entrada" ? "Entrada" : "Saída"}</span>
        <span class="${d.tipo === 'entrada' ? 'entrada' : 'saida'}">
          R$ ${d.valor.toFixed(2)}
        </span>
      </div>
    `;
  });

  document.getElementById("saldo").innerText = saldo.toFixed(2);
}
</script>

</body>
</html>
