<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>FluxoZap</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
  margin:0;
  font-family:'Inter',sans-serif;
  background:#0b0c10;
  color:white;
}

/* GRID */
.container{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:20px;
  padding:20px;
}

.bloco{
  background:#15171c;
  padding:20px;
  border-radius:15px;
  transition:0.2s;
}

.bloco:hover{
  transform:translateY(-5px);
}

.saldo{
  font-size:40px;
  font-weight:700;
}

/* INPUT */
input,select{
  width:100%;
  padding:12px;
  margin-top:10px;
  border:none;
  border-radius:10px;
  background:#222;
  color:white;
}

button{
  width:100%;
  padding:12px;
  margin-top:10px;
  border:none;
  border-radius:10px;
  font-weight:bold;
  cursor:pointer;
  transition:0.2s;
}

button:active{
  transform:scale(0.95);
}

.recebi{background:#00c853;}
.gastei{background:#ff1744;}

/* BARRA */
.barra{
  height:10px;
  background:#333;
  border-radius:10px;
  margin-top:10px;
}

.barra div{
  height:10px;
  background:#00c853;
  border-radius:10px;
  transition:0.5s;
}

/* GRAFICOS */
.graficos{
  display:flex;
  gap:10px;
}

canvas{
  width:100% !important;
  max-height:200px;
}

/* TOAST */
.toast{
  position:fixed;
  bottom:20px;
  left:50%;
  transform:translateX(-50%);
  background:#00c853;
  padding:12px 20px;
  border-radius:10px;
  opacity:0;
  transition:0.3s;
}

.toast.show{
  opacity:1;
}

/* MOBILE */
@media(max-width:900px){
  .container{grid-template-columns:1fr;}
  .graficos{flex-direction:column;}
}
</style>
</head>

<body>

<div class="container">

<div class="bloco">
  <div>Saldo Total</div>
  <div class="saldo">R$ <span id="saldo">0</span></div>
</div>

<div class="bloco">
  <div id="nome">Usuário</div>
</div>

<div class="bloco">
  <h3>Receber</h3>
  <input id="entradaValor" type="number">
  <button class="recebi" onclick="addEntrada()">Adicionar</button>

  <h3>Gastar</h3>
  <input id="saidaValor" type="number">
  <select id="categoria">
    <option>Alimentação</option>
    <option>Transporte</option>
    <option>Contas</option>
    <option>Lazer</option>
    <option>Outros</option>
  </select>
  <button class="gastei" onclick="addSaida()">Adicionar</button>
</div>

<div class="bloco">
  <h3>Orçamento mensal</h3>
  <input id="orcamentoInput" type="number">
  <button onclick="salvarOrcamento()">Salvar</button>

  <div>Usado: R$ <span id="usado">0</span></div>
  <div>Restante: R$ <span id="restante">0</span></div>

  <div class="barra">
    <div id="barra"></div>
  </div>

  <small id="alerta"></small>
</div>

<div class="bloco graficos">
  <canvas id="grafico1"></canvas>
  <canvas id="grafico2"></canvas>
</div>

<div class="bloco">
  <h3>Extrato</h3>
  <div id="lista"></div>
</div>

</div>

<div id="toast" class="toast">OK</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs, query, where } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const firebaseConfig={
  apiKey:"AIzaSyAh0Qi4lm-ZXQLe4YAca8wYbp5kcU6lY3I",
  authDomain:"fluxozap-10ead.firebaseapp.com",
  projectId:"fluxozap-10ead"
};

const app=initializeApp(firebaseConfig);
const db=getFirestore(app);
const auth=getAuth(app);

let userId="";
let chart1,chart2;
let orcamento=0;

function toast(msg){
  let t=document.getElementById("toast");
  t.innerText=msg;
  t.classList.add("show");
  setTimeout(()=>t.classList.remove("show"),2000);
}

onAuthStateChanged(auth,user=>{
  if(user){
    userId=user.uid;
    nome.innerText=user.email;
    carregar();
  }else{
    window.location.href="index.html";
  }
});

window.addEntrada=async()=>{
  let v=parseFloat(entradaValor.value);
  if(!v)return;

  await addDoc(collection(db,"movimentos"),{
    tipo:"entrada",valor:v,data:new Date().toISOString(),userId
  });

  toast("Entrada adicionada");
  entradaValor.value="";
  carregar();
}

window.addSaida=async()=>{
  let v=parseFloat(saidaValor.value);
  let cat=categoria.value;
  if(!v)return;

  await addDoc(collection(db,"movimentos"),{
    tipo:"saida",valor:v,categoria:cat,data:new Date().toISOString(),userId
  });

  toast("Gasto registrado");
  saidaValor.value="";
  carregar();
}

window.salvarOrcamento=async()=>{
  let v=parseFloat(orcamentoInput.value);
  if(!v)return;

  await addDoc(collection(db,"configuracao"),{
    userId,orcamentoMensal:v
  });

  toast("Orçamento salvo");
  carregar();
}

async function carregar(){

  let saldo=0,entrada=0,saida=0;
  let categorias={};

  lista.innerHTML="";

  const q=query(collection(db,"movimentos"),where("userId","==",userId));
  const docs=await getDocs(q);

  docs.forEach(doc=>{
    let d=doc.data();

    if(d.tipo==="entrada"){saldo+=d.valor;entrada+=d.valor;}
    else{
      saldo-=d.valor;saida+=d.valor;

      if(!categorias[d.categoria]) categorias[d.categoria]=0;
      categorias[d.categoria]+=d.valor;
    }

    lista.innerHTML+=`
      <div>
        ${d.tipo==="entrada"?"Entrada":"Saída"} - ${d.categoria||""}
        <br>R$ ${d.valor}
      </div>
    `;
  });

  saldoEl.innerText=saldo;

  const q2=query(collection(db,"configuracao"),where("userId","==",userId));
  const snap=await getDocs(q2);

  snap.forEach(doc=>orcamento=doc.data().orcamentoMensal);

  let perc=orcamento?(saida/orcamento)*100:0;

  usado.innerText=saida;
  restante.innerText=orcamento-saida;
  barra.style.width=perc+"%";

  if(perc>=100) alerta.innerText="Estourou!";
  else if(perc>=75) alerta.innerText="75% usado";
  else alerta.innerText="";

  if(chart1) chart1.destroy();
  chart1=new Chart(grafico1,{
    type:"doughnut",
    data:{labels:["Recebido","Gasto"],datasets:[{data:[entrada,saida]}]},
    options:{animation:{duration:800}}
  });

  if(chart2) chart2.destroy();
  chart2=new Chart(grafico2,{
    type:"doughnut",
    data:{
      labels:Object.keys(categorias),
      datasets:[{data:Object.values(categorias)}]
    },
    options:{animation:{duration:800}}
  });
}
</script>

</body>
</html>
