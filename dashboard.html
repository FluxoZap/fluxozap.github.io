<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>FluxoZap</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
 margin:0;
 background:#0b0c10;
 color:white;
 font-family:Arial;
}

.topo{
 background:#6a00ff;
 padding:20px;
 display:flex;
 justify-content:space-between;
 align-items:center;
}

.user{
 display:flex;
 align-items:center;
 gap:10px;
}

.user img{
 width:50px;
 height:50px;
 border-radius:50%;
}

.container{
 padding:15px;
 display:grid;
 gap:15px;
}

.card{
 background:#15171c;
 padding:15px;
 border-radius:15px;
}

canvas{
 height:120px !important;
}
</style>
</head>

<body>

<div class="topo">
 <div>
  <div id="nomeUsuario"></div>
  <h2>R$ <span id="saldo">0</span></h2>
 </div>

 <div class="user">
  <input type="file" id="fotoInput">
  <img id="fotoPerfil">
 </div>
</div>

<div class="container">

<div class="card">
 <input id="entrada">
 <button onclick="addEntrada()">Entrada</button>

 <input id="saida">
 <button onclick="addSaida()">Saída</button>
</div>

<div class="card">
 <canvas id="grafico"></canvas>
</div>

<div class="card">
 <div id="lista"></div>
</div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, addDoc, onSnapshot, query, where, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-storage.js";

const app = initializeApp({
 apiKey:"AIzaSyAh0Qi4lm-ZXQLe4YAca8wYbp5kcU6lY3I",
 authDomain:"fluxozap-10ead.firebaseapp.com",
 projectId:"fluxozap-10ead"
});

const db = getFirestore(app);
const auth = getAuth(app);
const storage = getStorage(app);

let empresaId="";
let chart;

onAuthStateChanged(auth, async user=>{
 if(!user) return location.href="index.html";

 let docUser = await getDoc(doc(db,"usuarios",user.uid));
 let data = docUser.data();

 empresaId = data.empresaId;

 nomeUsuario.innerText = data.nome || data.email;

 if(data.foto){
  fotoPerfil.src = data.foto;
 }

 carregar();
});

function carregar(){
 const q = query(collection(db,"movimentos"),where("empresaId","==",empresaId));

 onSnapshot(q,(snap)=>{
  let saldo=0,entrada=0,saida=0;

  lista.innerHTML="";

  snap.forEach(doc=>{
   let d=doc.data();
   let v=Number(d.valor)||0;

   if(d.tipo==="entrada"){
    saldo+=v; entrada+=v;
   }else{
    saldo-=v; saida+=v;
   }

   lista.innerHTML+=`<div>${d.tipo} R$ ${v}</div>`;
  });

  saldo.innerText=saldo.toFixed(2);

  if(chart) chart.destroy();

  chart = new Chart(document.getElementById("grafico"),{
   type:"doughnut",
   data:{
    labels:["Entrada","Saída"],
    datasets:[{
     data:[entrada,saida],
     backgroundColor:["green","red"]
    }]
   }
  });
 });
}

window.addEntrada=async()=>{
 await addDoc(collection(db,"movimentos"),{
  tipo:"entrada",
  valor:Number(entrada.value),
  empresaId
 });
}

window.addSaida=async()=>{
 await addDoc(collection(db,"movimentos"),{
  tipo:"saida",
  valor:Number(saida.value),
  empresaId
 });
}

fotoInput.onchange=async()=>{
 let file=fotoInput.files[0];

 let r=ref(storage,"foto"+auth.currentUser.uid);

 await uploadBytes(r,file);
 let url=await getDownloadURL(r);

 await setDoc(doc(db,"usuarios",auth.currentUser.uid),{
  foto:url
 },{merge:true});

 fotoPerfil.src=url;
}
</script>

</body>
</html>
