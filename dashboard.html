<!DOCTYPE html>
<html>
<head>
  <title>FluxoZap 💸</title>

  <style>
    body {
      margin: 0;
      font-family: 'Poppins', sans-serif;
      background: #0f0f0f;
      color: white;
    }

    .header {
      display: flex;
      justify-content: space-between;
      padding: 20px;
    }

    .nome {
      font-size: 18px;
      color: #aaa;
    }

    .saldo-card {
      background: linear-gradient(135deg, #00c853, #009624);
      margin: 20px;
      padding: 20px;
      border-radius: 20px;
      box-shadow: 0 0 20px rgba(0,0,0,0.5);
    }

    .saldo {
      font-size: 28px;
      font-weight: bold;
    }

    .acoes {
      display: flex;
      gap: 10px;
      padding: 0 20px;
    }

    .btn {
      flex: 1;
      padding: 15px;
      border-radius: 15px;
      border: none;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
    }

    .entrada {
      background: #00c853;
    }

    .saida {
      background: #d50000;
    }

    .extrato {
      padding: 20px;
    }

    .item {
      background: #1c1c1c;
      padding: 12px;
      margin-bottom: 10px;
      border-radius: 10px;
      display: flex;
      justify-content: space-between;
    }

    .entrada-cor { color: #00e676; }
    .saida-cor { color: #ff5252; }
  </style>
</head>

<body>

<div class="header">
  <div>
    <div class="nome">Olá, usuário 👋</div>
    <h2>FluxoZap 💸</h2>
  </div>
  <div>👤</div>
</div>

<div class="saldo-card">
  <div>Saldo disponível</div>
  <div class="saldo">R$ <span id="saldo">0.00</span></div>
</div>

<div class="acoes">
  <button class="btn entrada" onclick="entrada()">+ Recebi</button>
  <button class="btn saida" onclick="saida()">- Gastei</button>
</div>

<div class="extrato">
  <h3>Extrato</h3>
  <div id="lista"></div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs, query, where } 
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
import { getAuth, onAuthStateChanged } 
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyAh0Qi4lm-ZXQLe4YAca8wYbp5kcU6lY3I",
  authDomain: "fluxozap-10ead.firebaseapp.com",
  projectId: "fluxozap-10ead",
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

let saldo = 0;
let userId = null;

onAuthStateChanged(auth, (user) => {
  if (user) {
    userId = user.uid;
    carregar();
  } else {
    window.location = "index.html";
  }
});

window.entrada = async function() {
  let valor = parseFloat(prompt("Valor recebido:"));
  if (!valor) return;

  await addDoc(collection(db, "movimentos"), {
    tipo: "entrada",
    valor,
    userId
  });

  carregar();
}

window.saida = async function() {
  let valor = parseFloat(prompt("Valor gasto:"));
  if (!valor) return;

  await addDoc(collection(db, "movimentos"), {
    tipo: "saida",
    valor,
    userId
  });

  carregar();
}

async function carregar() {
  saldo = 0;
  let lista = document.getElementById("lista");
  lista.innerHTML = "";

  const q = query(collection(db, "movimentos"), where("userId", "==", userId));
  const querySnapshot = await getDocs(q);

  querySnapshot.forEach(doc => {
    let d = doc.data();

    if (d.tipo === "entrada") saldo += d.valor;
    else saldo -= d.valor;

    lista.innerHTML += `
      <div class="item">
        <span>${d.tipo}</span>
        <span class="${d.tipo === 'entrada' ? 'entrada-cor' : 'saida-cor'}">
          R$ ${d.valor}
        </span>
      </div>
    `;
  });

  document.getElementById("saldo").innerText = saldo.toFixed(2);
}
</script>

</body>
</html>
