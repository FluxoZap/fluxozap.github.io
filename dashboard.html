<!DOCTYPE html>
<html>
<head>
  <title>FluxoZap 💸</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(180deg, #0a0a0a, #141414);
      color: white;
    }

    .container {
      padding: 20px;
    }

    .topo {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .nome {
      font-size: 14px;
      color: #aaa;
    }

    .titulo {
      font-size: 20px;
      font-weight: 600;
    }

    .perfil {
      background: #1c1c1c;
      padding: 10px;
      border-radius: 50%;
    }

    .card {
      margin-top: 20px;
      background: linear-gradient(135deg, #00c853, #00b248);
      padding: 20px;
      border-radius: 20px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    }

    .saldo-label {
      font-size: 14px;
      opacity: 0.8;
    }

    .saldo {
      font-size: 32px;
      font-weight: 600;
      margin-top: 5px;
    }

    .acoes {
      display: flex;
      gap: 15px;
      margin-top: 20px;
    }

    .acao {
      flex: 1;
      background: #1c1c1c;
      padding: 15px;
      border-radius: 15px;
      text-align: center;
      cursor: pointer;
      transition: 0.2s;
    }

    .acao:hover {
      background: #2a2a2a;
    }

    .acao span {
      display: block;
      margin-top: 5px;
      font-size: 14px;
    }

    .extrato {
      margin-top: 25px;
    }

    .extrato h3 {
      font-weight: 500;
      margin-bottom: 10px;
    }

    .item {
      display: flex;
      justify-content: space-between;
      background: #1a1a1a;
      padding: 12px;
      border-radius: 12px;
      margin-bottom: 8px;
    }

    .valor-entrada {
      color: #00e676;
      font-weight: bold;
    }

    .valor-saida {
      color: #ff5252;
      font-weight: bold;
    }
  </style>
</head>

<body>

<div class="container">

  <div class="topo">
    <div>
      <div class="nome">Olá 👋</div>
      <div class="titulo">FluxoZap 💸</div>
    </div>
    <div class="perfil">👤</div>
  </div>

  <div class="card">
    <div class="saldo-label">Saldo disponível</div>
    <div class="saldo">R$ <span id="saldo">0.00</span></div>
  </div>

  <div class="acoes">
    <div class="acao" onclick="entrada()">➕<span>Recebi</span></div>
    <div class="acao" onclick="saida()">➖<span>Gastei</span></div>
  </div>

  <div class="extrato">
    <h3>Movimentações</h3>
    <div id="lista"></div>
  </div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs, query, where } 
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
import { getAuth, onAuthStateChanged } 
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSy...",
  authDomain: "fluxozap-10ead.firebaseapp.com",
  projectId: "fluxozap-10ead",
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

let saldo = 0;
let userId = null;

onAuthStateChanged(auth, (user) => {
  if (user) {
    userId = user.uid;
    carregar();
  } else {
    window.location = "index.html";
  }
});

window.entrada = async function() {
  let valor = parseFloat(prompt("Valor recebido:"));
  if (!valor) return;

  await addDoc(collection(db, "movimentos"), {
    tipo: "entrada",
    valor,
    userId
  });

  carregar();
}

window.saida = async function() {
  let valor = parseFloat(prompt("Valor gasto:"));
  if (!valor) return;

  await addDoc(collection(db, "movimentos"), {
    tipo: "saida",
    valor,
    userId
  });

  carregar();
}

async function carregar() {
  saldo = 0;
  let lista = document.getElementById("lista");
  lista.innerHTML = "";

  const q = query(collection(db, "movimentos"), where("userId", "==", userId));
  const querySnapshot = await getDocs(q);

  querySnapshot.forEach(doc => {
    let d = doc.data();

    if (d.tipo === "entrada") saldo += d.valor;
    else saldo -= d.valor;

    lista.innerHTML += `
      <div class="item">
        <span>${d.tipo}</span>
        <span class="${d.tipo === 'entrada' ? 'valor-entrada' : 'valor-saida'}">
          R$ ${d.valor}
        </span>
      </div>
    `;
  });

  document.getElementById("saldo").innerText = saldo.toFixed(2);
}
</script>

</body>
</html>
