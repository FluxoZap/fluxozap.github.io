<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>FluxoZap</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
  margin:0;
  font-family:'Inter',sans-serif;
  background:#0b0c10;
  color:white;
}

/* GRID PRINCIPAL */
.container{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:20px;
  padding:20px;
}

/* BLOCO */
.bloco{
  background:#15171c;
  padding:20px;
  border-radius:15px;
}

/* SALDO */
.saldo{
  font-size:40px;
  font-weight:700;
}

/* INPUT */
input,select{
  width:100%;
  padding:12px;
  margin-top:10px;
  border:none;
  border-radius:10px;
  background:#222;
  color:white;
}

button{
  width:100%;
  padding:12px;
  margin-top:10px;
  border:none;
  border-radius:10px;
  font-weight:bold;
}

.recebi{background:#00c853;}
.gastei{background:#ff1744;}

/* BARRA */
.barra{
  height:10px;
  background:#333;
  border-radius:10px;
  margin-top:10px;
}

.barra div{
  height:10px;
  background:#00c853;
  border-radius:10px;
}

/* GRAFICOS */
.graficos{
  display:flex;
  gap:10px;
}

canvas{
  width:100% !important;
  max-height:200px;
}

/* MOBILE */
@media(max-width:900px){
  .container{grid-template-columns:1fr;}
  .graficos{flex-direction:column;}
}
</style>
</head>

<body>

<div class="container">

<!-- SALDO -->
<div class="bloco">
  <div>Saldo Total</div>
  <div class="saldo">R$ <span id="saldo">0</span></div>
</div>

<!-- CONTA -->
<div class="bloco">
  <div id="nome">Usuário</div>
  <small>Conta</small>
</div>

<!-- MOVIMENTOS -->
<div class="bloco">
  <h3>Receber</h3>
  <input id="entradaValor" type="number">
  <button class="recebi" onclick="addEntrada()">Adicionar</button>

  <h3>Gastar</h3>
  <input id="saidaValor" type="number">
  <select id="categoria">
    <option>Alimentação</option>
    <option>Transporte</option>
    <option>Contas</option>
    <option>Lazer</option>
    <option>Outros</option>
  </select>
  <button class="gastei" onclick="addSaida()">Adicionar</button>
</div>

<!-- ORÇAMENTO -->
<div class="bloco">
  <h3>Orçamento mensal</h3>
  <input id="orcamentoInput" type="number">
  <button onclick="salvarOrcamento()">Salvar</button>

  <div>Usado: R$ <span id="usado">0</span></div>
  <div>Restante: R$ <span id="restante">0</span></div>

  <div class="barra">
    <div id="barra"></div>
  </div>

  <small id="alerta"></small>
</div>

<!-- GRAFICOS -->
<div class="bloco graficos">
  <canvas id="grafico1"></canvas>
  <canvas id="grafico2"></canvas>
</div>

<!-- EXTRATO -->
<div class="bloco">
  <h3>Extrato</h3>
  <div id="lista"></div>
</div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs, query, where } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const firebaseConfig={
  apiKey:"AIzaSyAh0Qi4lm-ZXQLe4YAca8wYbp5kcU6lY3I",
  authDomain:"fluxozap-10ead.firebaseapp.com",
  projectId:"fluxozap-10ead"
};

const app=initializeApp(firebaseConfig);
const db=getFirestore(app);
const auth=getAuth(app);

let userId="";
let chart1,chart2;
let orcamento=0;

onAuthStateChanged(auth,user=>{
  if(user){
    userId=user.uid;
    nome.innerText=user.email;
    carregar();
  }else{
    window.location.href="index.html";
  }
});

window.addEntrada=async()=>{
  let v=parseFloat(entradaValor.value);
  if(!v)return;

  await addDoc(collection(db,"movimentos"),{
    tipo:"entrada",valor:v,data:new Date().toISOString(),userId
  });

  carregar();
}

window.addSaida=async()=>{
  let v=parseFloat(saidaValor.value);
  let cat=categoria.value;
  if(!v)return;

  await addDoc(collection(db,"movimentos"),{
    tipo:"saida",valor:v,categoria:cat,data:new Date().toISOString(),userId
  });

  carregar();
}

window.salvarOrcamento=async()=>{
  let v=parseFloat(orcamentoInput.value);
  if(!v)return;

  await addDoc(collection(db,"configuracao"),{
    userId,orcamentoMensal:v
  });

  carregar();
}

async function carregar(){

  let saldo=0,entrada=0,saida=0;
  let categorias={};

  lista.innerHTML="";

  const q=query(collection(db,"movimentos"),where("userId","==",userId));
  const docs=await getDocs(q);

  docs.forEach(doc=>{
    let d=doc.data();

    if(d.tipo==="entrada"){saldo+=d.valor;entrada+=d.valor;}
    else{
      saldo-=d.valor;saida+=d.valor;

      if(!categorias[d.categoria]) categorias[d.categoria]=0;
      categorias[d.categoria]+=d.valor;
    }

    lista.innerHTML+=`
      <div>
        ${d.tipo==="entrada"?"Entrada":"Saída"} - ${d.categoria||""}
        <br>R$ ${d.valor}
      </div>
    `;
  });

  saldoEl.innerText=saldo;

  // orçamento
  const q2=query(collection(db,"configuracao"),where("userId","==",userId));
  const snap=await getDocs(q2);

  snap.forEach(doc=>orcamento=doc.data().orcamentoMensal);

  let perc=orcamento?(saida/orcamento)*100:0;

  usado.innerText=saida;
  restante.innerText=orcamento-saida;
  barra.style.width=perc+"%";

  if(perc>=100) alerta.innerText="Estourou orçamento!";
  else if(perc>=75) alerta.innerText="75% usado";
  else alerta.innerText="";

  // gráfico 1
  if(chart1) chart1.destroy();
  chart1=new Chart(grafico1,{
    type:"doughnut",
    data:{labels:["Recebido","Gasto"],datasets:[{data:[entrada,saida]}]}
  });

  // gráfico 2
  if(chart2) chart2.destroy();
  chart2=new Chart(grafico2,{
    type:"doughnut",
    data:{
      labels:Object.keys(categorias),
      datasets:[{data:Object.values(categorias)}]
    }
  });
}
</script>

</body>
</html>
