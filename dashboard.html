<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>FluxoZap</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body{margin:0;font-family:Arial;background:#0b0b0b;color:white;display:flex;}
.menu{width:230px;background:#0f0f0f;padding:20px;height:100vh;}
.menu h2{color:#7c4dff;}
.menu a{display:block;color:#aaa;margin:15px 0;cursor:pointer;}
.main{flex:1;padding:20px;}

.top{display:flex;justify-content:space-between;}
.profile img{width:50px;height:50px;border-radius:50%;}

.cards{display:grid;grid-template-columns:repeat(4,1fr);gap:15px;margin-top:20px;}
.card{background:#111;padding:20px;border-radius:15px;}

.grid{display:grid;grid-template-columns:2fr 1fr;gap:15px;margin-top:20px;}

button,input,select{width:100%;padding:10px;margin-top:10px;border:none;border-radius:10px;}

.modal{position:fixed;width:100%;height:100%;background:#000c;display:none;align-items:center;justify-content:center;}
.modal-content{background:#111;padding:20px;border-radius:15px;text-align:center;}
</style>
</head>

<body>

<div class="menu">
<h2>FluxoZap</h2>
<a onclick="abrirPlanos()">💳 Assinar</a>
</div>

<div class="main">

<div class="top">
<h2 id="nome"></h2>
<div class="profile">
<img id="foto">
<input type="file" onchange="trocarFoto(event)">
</div>
</div>

<div class="cards">
<div class="card">Saldo Total <b id="total">0</b></div>
<div class="card">Entradas <b id="entradaMes">0</b></div>
<div class="card">Saídas <b id="saidaMes">0</b></div>
<div class="card">Hoje <b id="dia">0</b></div>
</div>

<div class="grid">
<div class="card">
<input id="entrada" placeholder="Entrada">
<button onclick="addEntrada()">Adicionar</button>

<input id="saida" placeholder="Saída">
<select id="cat">
<option>Alimentação</option>
<option>Gasolina</option>
<option>Energia</option>
<option>Água</option>
<option>Aluguel</option>
<option>Funcionário</option>
<option>Internet</option>
<option>Outros</option>
</select>
<button onclick="addSaida()">Adicionar</button>
</div>

<div class="card">
<button onclick="pdf()">Gerar PDF</button>
</div>
</div>

<canvas id="grafico"></canvas>

</div>

<div class="modal" id="modal">
<div class="modal-content">
<img id="qr" width="200">
<p id="statusPix">Aguardando pagamento...</p>
</div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

// 🔥 SUA CONFIG REAL (JÁ COLOCADA)
const firebaseConfig = {
  apiKey: "AIzaSyAh0Qi4lm-ZXQLe4YAca8wYbp5kcU6lY3I",
  authDomain: "fluxozap-10ead.firebaseapp.com",
  projectId: "fluxozap-10ead",
  storageBucket: "fluxozap-10ead.firebasestorage.app",
  messagingSenderId: "743375450552",
  appId: "1:743375450552:web:48b85313fbc7fc30b29f4d"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

let dados = [];
let plano = "gratis";
let usuarioId = null;
let chart;

// 🔐 LOGIN
onAuthStateChanged(auth, async (user)=>{
if(!user){
window.location.href="index.html";
}else{
usuarioId = user.uid;
document.getElementById("nome").innerText = user.email;
document.getElementById("foto").src = localStorage.getItem("foto") || "";
await carregar();
}
});

// 🔥 CARREGAR
async function carregar(){
const ref = doc(db,"usuarios",usuarioId);
const snap = await getDoc(ref);

if(snap.exists()){
dados = snap.data().dados || [];
plano = snap.data().plano || "gratis";
}

atualizar();
}

// 🔥 SALVAR
async function salvar(){
await setDoc(doc(db,"usuarios",usuarioId),{
dados:dados,
plano:plano
});
}

// 🔥 ATUALIZAR
function atualizar(){

let total=0,e=0,s=0,dia=0;
let hoje=new Date().toISOString().slice(0,10);

dados.forEach(d=>{
if(d.tipo=="entrada"){
total+=d.valor;
e+=d.valor;
if(d.data===hoje) dia+=d.valor;
}else{
total-=d.valor;
s+=d.valor;
if(d.data===hoje) dia-=d.valor;
}
});

document.getElementById("total").innerText=total.toFixed(2);
document.getElementById("entradaMes").innerText=e.toFixed(2);
document.getElementById("saidaMes").innerText=s.toFixed(2);
document.getElementById("dia").innerText=dia.toFixed(2);

// evita bug gráfico duplicado
if(chart) chart.destroy();

chart = new Chart(document.getElementById("grafico"),{
type:"doughnut",
data:{
labels:["Entradas","Saídas"],
datasets:[{
data:[e,s],
backgroundColor:["#00c853","#ff1744"]
}]
}
});
}

// 🔥 ENTRADA
window.addEntrada=()=>{
let v=Number(entrada.value);
if(!v) return;

dados.push({
tipo:"entrada",
valor:v,
data:new Date().toISOString().slice(0,10)
});

salvar();
atualizar();
}

// 🔥 SAÍDA
window.addSaida=()=>{
let v=Number(saida.value);
if(!v) return;

dados.push({
tipo:"saida",
valor:v,
categoria:cat.value,
data:new Date().toISOString().slice(0,10)
});

salvar();
atualizar();
}

// PDF
window.pdf=()=>{
const { jsPDF } = window.jspdf;
let docu=new jsPDF();
let y=10;

dados.forEach(d=>{
docu.text(`${d.tipo} R$${d.valor}`,10,y);
y+=10;
});

docu.save("extrato.pdf");
}

// FOTO
window.trocarFoto=(e)=>{
let r=new FileReader();
r.onload=()=>{
localStorage.setItem("foto",r.result);
document.getElementById("foto").src=r.result;
};
r.readAsDataURL(e.target.files[0]);
}

// PIX
window.abrirPlanos=async()=>{
document.getElementById("modal").style.display="flex";

let res = await fetch("http://localhost:3000/criar-pix",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({plano:"pro"})
});

let data = await res.json();
document.getElementById("qr").src=data.qrCode;

verificar(data.txid);
}

// VERIFICA PIX
async function verificar(txid){
let i=setInterval(async()=>{

let r=await fetch("http://localhost:3000/status/"+txid);
let d=await r.json();

if(d.status=="CONCLUIDA"){
clearInterval(i);

document.getElementById("statusPix").innerText="Pagamento confirmado!";
plano="pro";

await salvar();

setTimeout(()=>{
document.getElementById("modal").style.display="none";
},2000);
}

},3000);
}

</script>

</body>
</html>
